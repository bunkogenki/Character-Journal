<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Character Journal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f6f5ff;color:#1a1a1a;min-height:100vh}
.header{background:white;border-bottom:1px solid #ede9fe;padding:.9rem 1rem;position:sticky;top:0;z-index:50}
.header-inner{max-width:960px;margin:0 auto}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.site-title{font-size:19px;font-weight:700;color:#4c1d95;white-space:nowrap}
.header-actions{display:flex;gap:8px;align-items:center}
#search{width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;background:white;color:#1a1a1a}
#search:focus{outline:none;border-color:#7c3aed}
.filters{display:flex;gap:6px;flex-wrap:wrap;padding-top:8px}
.pill{padding:5px 13px;border-radius:20px;border:1px solid #e0e0e0;background:white;font-size:12px;color:#666;cursor:pointer;white-space:nowrap;transition:all .15s}
.pill:hover{border-color:#7c3aed;color:#7c3aed}
.pill.active{background:#7c3aed;color:white;border-color:#7c3aed}
.main{max-width:960px;margin:0 auto;padding:1rem}
.count-label{font-size:12px;color:#aaa;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px}
.card{background:white;border-radius:14px;padding:1rem;cursor:pointer;border:2px solid #ede9fe;transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:0 6px 20px rgba(124,58,237,.13);transform:translateY(-2px)}
.card-img{width:72px;height:72px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;overflow:hidden}
.card-img.sh-circle{border-radius:50%}
.card-img.sh-rounded{border-radius:14px}
.card-img.sh-square{border-radius:4px}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-name{font-size:14px;font-weight:600;text-align:center;margin-bottom:3px;line-height:1.3}
.card-kanji{font-size:13px;color:#888;text-align:center;margin-bottom:7px}
.card-cat-wrap{text-align:center;margin-bottom:5px}
.card-aff-wrap{text-align:center;margin-bottom:5px}
.badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600;display:inline-block}
.color-dot{width:9px;height:9px;border-radius:50%;display:inline-block;vertical-align:middle;border:1px solid rgba(0,0,0,.1)}
.card-color-row{text-align:center;margin-bottom:5px;font-size:10px;color:#888}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;background:#f5f3ff;color:#7c3aed;border:1px solid #ede9fe}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto}
.modal{background:white;border-radius:18px;width:100%;max-width:540px;padding:1.5rem;position:relative;margin:auto}
.modal-wide{max-width:660px}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:22px;cursor:pointer;color:#bbb;line-height:1;padding:0;z-index:2}
.modal-close:hover{color:#555}
.modal-title{font-size:17px;font-weight:700;margin-bottom:1.1rem;color:#4c1d95}
.detail-hero{border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.detail-hero-top{display:flex;gap:1rem;align-items:flex-start}
.detail-avatar{width:88px;height:88px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;overflow:hidden;border:3px solid rgba(255,255,255,.5)}
.detail-avatar.sh-circle{border-radius:50%}
.detail-avatar.sh-rounded{border-radius:16px}
.detail-avatar.sh-square{border-radius:6px}
.detail-avatar img{width:100%;height:100%;object-fit:cover}
.detail-name{font-size:21px;font-weight:700;line-height:1.2;margin-bottom:3px}
.detail-kanji{font-size:15px;opacity:.7;margin-bottom:7px}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.detail-meta{font-size:13px;opacity:.75;margin-bottom:3px}
.section-label{font-size:11px;font-weight:600;color:#aaa;letter-spacing:.07em;text-transform:uppercase;margin:1rem 0 .5rem}
.detail-note{background:#faf8ff;border:1px solid #ede9fe;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.7;white-space:pre-wrap}
.detail-tags-row{display:flex;gap:5px;flex-wrap:wrap}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.gallery-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;border:1px solid #ede9fe;transition:transform .15s}
.gallery-thumb:hover{transform:scale(1.04)}
.gallery-lb{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;cursor:pointer}
.gallery-lb img{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain}
.link-list{display:flex;flex-direction:column;gap:6px}
.link-item{display:flex;align-items:center;gap:8px;padding:9px 13px;background:#f9f8ff;border:1px solid #ede9fe;border-radius:9px;text-decoration:none;color:#1a1a1a;font-size:14px;transition:background .15s}
.link-item:hover{background:#ede9fe}
.link-icon{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.link-label{font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-arr{color:#bbb;font-size:12px}
.yt-wrap{display:flex;flex-direction:column;gap:12px}
.yt-title{font-size:13px;font-weight:500;color:#555;margin-bottom:5px}
.yt-embed{border-radius:11px;overflow:hidden;background:#000;aspect-ratio:16/9}
.yt-embed iframe{width:100%;height:100%;border:none;display:block}
.field{margin-bottom:.8rem}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px;font-weight:500}
.field input,.field textarea,.field select{width:100%;padding:8px 11px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;background:white;color:#1a1a1a;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:#7c3aed}
.field textarea{min-height:90px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.img-row{display:flex;gap:10px;align-items:flex-start}
.img-preview-box{width:64px;height:64px;border:1px solid #ede9fe;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;background:#f5f3ff;transition:border-radius .2s}
.img-preview-box.sh-circle{border-radius:50%}
.img-preview-box.sh-rounded{border-radius:14px}
.img-preview-box.sh-square{border-radius:4px}
.img-preview-box img{width:100%;height:100%;object-fit:cover;display:none}
.img-ph{font-size:24px;color:#c4b5fd}
.img-inputs{flex:1;display:flex;flex-direction:column;gap:6px}
.shape-btns{display:flex;gap:5px}
.shape-opt{padding:3px 10px;border:1px solid #e0e0e0;border-radius:20px;font-size:11px;cursor:pointer;background:white;color:#666;transition:all .15s}
.shape-opt.active{background:#7c3aed;color:white;border-color:#7c3aed}
.color-row{display:flex;align-items:center;gap:8px}
.color-row input[type=color]{width:38px;height:36px;border:1px solid #e0e0e0;border-radius:8px;padding:2px;cursor:pointer;background:white;flex-shrink:0}
.color-row input[type=text]{flex:1}
.btn-clr{background:none;border:1px solid #e0e0e0;border-radius:7px;padding:4px 9px;font-size:12px;cursor:pointer;color:#999;flex-shrink:0}
.btn-clr:hover{background:#f5f5f5}
.form-gallery-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;min-height:0}
.gal-item{position:relative;width:66px;height:66px}
.gal-item img{width:100%;height:100%;object-fit:cover;border-radius:8px;border:1px solid #ede9fe}
.gal-rm{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:#e53e3e;color:white;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
.gal-add-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.gal-add-row input[type=text]{flex:1;min-width:100px;padding:6px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;background:white;color:#1a1a1a}
.gal-add-row input[type=text]:focus{outline:none;border-color:#7c3aed}
.gal-add-row input[type=file]{font-size:12px}
.sm-btn{padding:6px 11px;font-size:12px;border-radius:7px;border:1px solid #e0e0e0;background:white;cursor:pointer;white-space:nowrap;font-family:inherit}
.sm-btn:hover{background:#f5f3ff;border-color:#7c3aed}
.link-form-item{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.link-form-item input{padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;background:white;color:#1a1a1a}
.link-form-item input:focus{outline:none;border-color:#7c3aed}
.lbl-inp{width:110px;flex-shrink:0}
.url-inp{flex:1}
.lk-rm{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:0 2px;line-height:1;flex-shrink:0}
.lk-rm:hover{color:#e53e3e}
.btn{padding:9px 16px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid #e0e0e0;background:white;color:#1a1a1a;transition:all .15s;font-family:inherit}
.btn:hover{background:#f9f9f9}
.btn-primary{background:#7c3aed;color:white;border-color:#7c3aed}
.btn-primary:hover{background:#6d28d9}
.btn-danger{color:#dc2626;border-color:#fecaca}
.btn-danger:hover{background:#fef2f2}
.btn-row{display:flex;gap:8px;margin-top:.5rem}
.btn-row .btn{flex:1}
.add-btn{padding:8px 16px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:#7c3aed;color:white;font-family:inherit}
.add-btn:hover{background:#6d28d9}
.menu-btn{padding:7px 10px;border-radius:8px;border:1px solid #e0e0e0;background:white;cursor:pointer;font-size:16px;line-height:1}
.menu-btn:hover{background:#f5f3ff}
.fab{display:none;position:fixed;bottom:1.5rem;right:1.5rem;width:58px;height:58px;border-radius:50%;background:#7c3aed;color:white;font-size:28px;border:none;cursor:pointer;z-index:40;box-shadow:0 4px 16px rgba(124,58,237,.5);align-items:center;justify-content:center;line-height:1}
.fab:active{transform:scale(.95)}
.empty{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:#bbb}
.empty-icon{font-size:48px;margin-bottom:.75rem}
hr.div{border:none;border-top:1px solid #f0f0f0;margin:1rem 0}
.settings-row{display:flex;gap:8px;flex-wrap:wrap}
@media(max-width:580px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
  .form-row{grid-template-columns:1fr}
  .fab{display:flex}
  .add-btn{display:none}
  .modal{padding:1.25rem;border-radius:14px}
  .site-title{font-size:16px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="site-title" id="site-title-el">✦ My Journal</div>
      <div class="header-actions">
        <button class="add-btn" onclick="openAdd()">+ Add</button>
        <button class="menu-btn" onclick="openMenu()">⋯</button>
      </div>
    </div>
    <input type="text" id="search" placeholder="Search by name, kanji, show, tag…" oninput="render()">
    <div class="filters" id="filters"></div>
  </div>
</div>

<div class="main">
  <div class="count-label" id="count-label"></div>
  <div class="grid" id="grid"></div>
</div>

<button class="fab" onclick="openAdd()">+</button>
<div id="modal-root"></div>

<script>
const PALETTES=[
  ['#ede9fe','#4c1d95'],['#d1fae5','#064e3b'],['#fce7f3','#831843'],
  ['#fef3c7','#78350f'],['#dbeafe','#1e3a8a'],['#ffe4e6','#881337'],
  ['#f0fdf4','#14532d'],['#fff7ed','#7c2d12'],['#f0f9ff','#0c4a6e'],
  ['#fdf4ff','#581c87'],['#ecfdf5','#022c22'],['#fef9c3','#713f12'],
];
const AFFINITY=[
  {value:'kamioshi',label:'神推し — Kamioshi',short:'神推し',bg:'#fef3c7',color:'#78350f'},
  {value:'oshi',    label:'推し — Oshi',       short:'推し',  bg:'#ede9fe',color:'#4c1d95'},
  {value:'love',    label:'Love',              short:'Love', bg:'#fce7f3',color:'#831843'},
  {value:'like',    label:'Like',              short:'Like', bg:'#dbeafe',color:'#1e3a8a'},
  {value:'know',    label:'Know of',           short:'Know', bg:'#f3f4f6',color:'#374151'},
];
const DEFAULT_CATS=['Anime character','VTuber / Streamer','Musician','Actor / Celebrity','Fictional character','Athlete','Other'];

function loadDB(){try{return JSON.parse(localStorage.getItem('cj_v3')||'null')||{};}catch(e){return{};}}
function saveDB(d){localStorage.setItem('cj_v3',JSON.stringify(d));}
function getDB(){
  const d=loadDB();
  if(!Array.isArray(d.entries))d.entries=[];
  if(!Array.isArray(d.cats))d.cats=[...DEFAULT_CATS];
  if(!d.title)d.title='My Journal';
  if(typeof d.nextId!=='number')d.nextId=1;
  return d;
}
function initials(n){return(n||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();}
function pal(id){return PALETTES[(id||0)%PALETTES.length];}
function catPal(cat,cats){const i=cats.indexOf(cat);return PALETTES[(i>=0?i:0)%PALETTES.length];}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function affData(v){return AFFINITY.find(a=>a.value===v)||null;}
function ytId(url){const m=(url||'').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?/\s]+)/);return m?m[1]:null;}
function lkIcon(url){
  if(ytId(url))return'▶';
  if(/twitter\.com|x\.com/.test(url))return'𝕏';
  if(/instagram\.com/.test(url))return'📷';
  if(/tiktok\.com/.test(url))return'♪';
  if(/twitch\.tv/.test(url))return'🎮';
  if(/spotify\.com/.test(url))return'♫';
  if(/youtube\.com|youtu\.be/.test(url))return'▶';
  return'🔗';
}

let activeFilter='All';
let currentShape='circle';
let formGallery=[];
let formLinks=[];

function render(){
  const db=getDB();
  const q=(document.getElementById('search').value||'').toLowerCase();
  document.getElementById('site-title-el').textContent='✦ '+db.title;

  const usedCats=[...new Set(db.entries.map(e=>e.cat))];
  const filterCats=['All',...usedCats];
  if(!filterCats.includes(activeFilter))activeFilter='All';
  document.getElementById('filters').innerHTML=filterCats.map(f=>
    `<div class="pill${activeFilter===f?' active':''}" onclick="setFilter(${JSON.stringify(f)})">${esc(f)}</div>`
  ).join('');

  let list=db.entries.filter(e=>{
    const mf=activeFilter==='All'||e.cat===activeFilter;
    if(!q)return mf;
    const hay=[e.name,e.kanji,e.source,e.note,...(e.tags||[])].join(' ').toLowerCase();
    return mf&&hay.includes(q);
  });

  document.getElementById('count-label').textContent=list.length+' entr'+(list.length===1?'y':'ies');

  if(!list.length){
    document.getElementById('grid').innerHTML=`<div class="empty"><div class="empty-icon">${db.entries.length?'🔍':'✨'}</div><p>${db.entries.length?'No results found.':'No entries yet — hit + Add to get started!'}</p></div>`;
    return;
  }

  document.getElementById('grid').innerHTML=list.map(e=>{
    const sh=e.imgShape||'circle';
    const[bg,fg]=e.hexColor?[e.hexColor+'22',e.hexColor]:pal(e.id);
    const[cbg,cfg]=catPal(e.cat,db.cats);
    const aff=affData(e.affinity);
    const bdr=e.hexColor?e.hexColor+'55':'#ede9fe';
    const av=e.img?`<img src="${esc(e.img)}" alt="" onerror="this.style.display='none'">`:'';
    return`<div class="card" style="border-color:${bdr}" onclick="openDetail(${e.id})">
      <div class="card-img sh-${sh}" style="background:${bg};color:${fg}">${av||initials(e.name)}</div>
      <div class="card-name">${esc(e.name)}</div>
      ${e.kanji?`<div class="card-kanji">${esc(e.kanji)}</div>`:'<div style="height:17px"></div>'}
      <div class="card-cat-wrap"><span class="badge" style="background:${cbg};color:${cfg}">${esc(e.cat)}</span></div>
      ${aff?`<div class="card-aff-wrap"><span class="badge" style="background:${aff.bg};color:${aff.color}">${aff.short}</span></div>`:''}
      ${e.hexColor?`<div class="card-color-row"><span class="color-dot" style="background:${e.hexColor}"></span> ${e.hexColor}</div>`:''}
      <div class="card-tags">${(e.tags||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function setFilter(f){activeFilter=f;render();}

function openDetail(id){
  const db=getDB();
  const e=db.entries.find(x=>x.id===id);
  if(!e)return;
  const sh=e.imgShape||'circle';
  const[bg,fg]=e.hexColor?[e.hexColor+'22',e.hexColor]:pal(e.id);
  const[cbg,cfg]=catPal(e.cat,db.cats);
  const aff=affData(e.affinity);
  const heroBg=e.hexColor?e.hexColor+'15':bg;
  const av=e.img?`<img src="${esc(e.img)}" alt="" onerror="this.style.display='none'">`:'';

  const galleryHtml=(e.gallery||[]).length?`
    <div class="section-label">Gallery</div>
    <div class="gallery-grid">${e.gallery.map(src=>
      `<img class="gallery-thumb" src="${esc(src)}" loading="lazy" onclick="openLB('${esc(src)}')" onerror="this.style.display='none'">`
    ).join('')}</div>`:'';

  const regLinks=(e.links||[]).filter(l=>!ytId(l.url));
  const ytLinks=(e.links||[]).filter(l=>ytId(l.url));

  const linksHtml=regLinks.length?`
    <div class="section-label">Links</div>
    <div class="link-list">${regLinks.map(l=>`
      <a class="link-item" href="${esc(l.url)}" target="_blank" rel="noopener">
        <span class="link-icon">${lkIcon(l.url)}</span>
        <span class="link-label">${esc(l.label||l.url)}</span>
        <span class="link-arr">↗</span>
      </a>`).join('')}</div>`:'';

  const videosHtml=ytLinks.length?`
    <div class="section-label">Videos</div>
    <div class="yt-wrap">${ytLinks.map(l=>`
      <div>
        ${l.label?`<div class="yt-title">${esc(l.label)}</div>`:''}
        <div class="yt-embed"><iframe src="https://www.youtube.com/embed/${ytId(l.url)}" allowfullscreen loading="lazy"></iframe></div>
      </div>`).join('')}</div>`:'';

  showModal(`
    <div class="detail-hero" style="background:${heroBg}">
      <div class="detail-hero-top">
        <div class="detail-avatar sh-${sh}" style="background:${bg};color:${fg};border-color:rgba(255,255,255,.5)">${av||initials(e.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="detail-name">${esc(e.name)}</div>
          ${e.kanji?`<div class="detail-kanji">${esc(e.kanji)}</div>`:''}
          <div class="detail-badges">
            <span class="badge" style="background:${cbg};color:${cfg}">${esc(e.cat)}</span>
            ${aff?`<span class="badge" style="background:${aff.bg};color:${aff.color}">${aff.short}</span>`:''}
            ${e.hexColor?`<span class="badge" style="background:${e.hexColor}20;color:${e.hexColor}"><span class="color-dot" style="background:${e.hexColor}"></span> ${e.hexColor}</span>`:''}
          </div>
          ${e.source?`<div class="detail-meta">📍 ${esc(e.source)}</div>`:''}
          ${e.birthday?`<div class="detail-meta">🎂 ${esc(e.birthday)}</div>`:''}
        </div>
      </div>
    </div>
    ${(e.tags||[]).length?`<div class="section-label">Tags</div><div class="detail-tags-row">${e.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
    ${e.note?`<div class="section-label">Notes</div><div class="detail-note">${esc(e.note)}</div>`:''}
    ${galleryHtml}
    ${linksHtml}
    ${videosHtml}
    <div class="btn-row" style="margin-top:1rem">
      <button class="btn btn-primary" onclick="openEdit(${e.id})">Edit entry</button>
      <button class="btn" onclick="closeModal()">Close</button>
    </div>`,true);
}

function openLB(src){
  const lb=document.createElement('div');
  lb.className='gallery-lb';
  lb.onclick=()=>lb.remove();
  lb.innerHTML=`<img src="${esc(src)}" alt="">`;
  document.body.appendChild(lb);
}

/* ── Form ── */
function formFields(e,cats){
  const sh=e?e.imgShape||'circle':'circle';
  const imgSrc=e&&e.img?esc(e.img):'';
  const affVal=e?e.affinity||'':'';
  const catOpts=cats.map(c=>`<option${e&&e.cat===c?' selected':''}>${esc(c)}</option>`).join('');
  const affOpts=`<option value="">— select —</option>`+AFFINITY.map(a=>`<option value="${a.value}"${affVal===a.value?' selected':''}>${a.label}</option>`).join('');
  const hexVal=e&&e.hexColor?esc(e.hexColor):'';
  const imgUrlVal=e&&e.img&&!e.img.startsWith('data:')?esc(e.img):'';
  return`
    <div class="form-row">
      <div class="field"><label>Name *</label><input id="f-name" value="${e?esc(e.name):''}" placeholder="e.g. Gojo Satoru"></div>
      <div class="field"><label>Kanji / Japanese name</label><input id="f-kanji" value="${e?esc(e.kanji||''):''}" placeholder="e.g. 五条悟"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Source (show, group…)</label><input id="f-source" value="${e?esc(e.source||''):''}" placeholder="e.g. Jujutsu Kaisen"></div>
      <div class="field"><label>Category</label><select id="f-cat">${catOpts}</select></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Affinity level</label><select id="f-affinity">${affOpts}</select></div>
      <div class="field"><label>Birthday</label><input id="f-birthday" value="${e?esc(e.birthday||''):''}" placeholder="e.g. March 15 or 03/15"></div>
    </div>
    <div class="field">
      <label>Assigned color (hex code)</label>
      <div class="color-row">
        <input type="color" id="f-cpicker" value="${hexVal||'#7c3aed'}" oninput="syncColor('picker')">
        <input type="text" id="f-ctext" value="${hexVal}" placeholder="#7c3aed" oninput="syncColor('text')">
        <button class="btn-clr" onclick="clearColor()">Clear</button>
      </div>
    </div>
    <div class="field">
      <label>Main image</label>
      <div class="img-row">
        <div class="img-preview-box sh-${sh}" id="img-prev-box">
          <img id="img-prev" src="${imgSrc}" alt="" style="${imgSrc?'':'display:none'}" onerror="this.style.display='none'">
          <span class="img-ph" id="img-ph" style="${imgSrc?'display:none':''}">🖼</span>
        </div>
        <div class="img-inputs">
          <input id="f-img-url" placeholder="Paste image URL…" value="${imgUrlVal}" oninput="onUrlInput()">
          <input type="file" id="f-img-file" accept="image/*" onchange="onFileInput()" style="font-size:13px">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:11px;color:#aaa">Shape:</span>
            <div class="shape-btns">
              ${['circle','rounded','square'].map(s=>`<button class="shape-opt${sh===s?' active':''}" onclick="setShape('${s}')">${s}</button>`).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="field"><label>Tags (comma separated)</label><input id="f-tags" value="${e?(e.tags||[]).join(', '):''}" placeholder="fav, funny, oshi…"></div>
    <div class="field"><label>Notes / description</label><textarea id="f-note" placeholder="What do you love about them? Anything you want to remember…">${e?esc(e.note||''):''}</textarea></div>
    <div class="field">
      <label>Gallery (extra images)</label>
      <div class="form-gallery-grid" id="gal-items"></div>
      <div class="gal-add-row">
        <input type="text" id="gal-url-inp" placeholder="Paste image URL…">
        <button class="sm-btn" onclick="addGalUrl()">Add URL</button>
        <input type="file" accept="image/*" onchange="addGalFile(this)" style="font-size:12px">
      </div>
    </div>
    <div class="field">
      <label>Links & videos</label>
      <div id="links-list"></div>
      <button class="sm-btn" style="margin-top:6px" onclick="addLink()">+ Add link</button>
      <div style="font-size:11px;color:#aaa;margin-top:5px">YouTube URLs are automatically embedded as video players. Any social media link works.</div>
    </div>`;
}

function renderGalItems(){
  const el=document.getElementById('gal-items');
  if(!el)return;
  el.innerHTML=formGallery.map((src,i)=>`
    <div class="gal-item">
      <img src="${esc(src)}" onerror="this.style.opacity='.3'">
      <button class="gal-rm" onclick="rmGal(${i})">✕</button>
    </div>`).join('');
}
function rmGal(i){formGallery.splice(i,1);renderGalItems();}
function addGalUrl(){
  const inp=document.getElementById('gal-url-inp');
  const url=(inp.value||'').trim();
  if(!url)return;
  formGallery.push(url);inp.value='';renderGalItems();
}
function addGalFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=700;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      formGallery.push(canvas.toDataURL('image/jpeg',.85));
      renderGalItems();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);input.value='';
}

function renderLinks(){
  const el=document.getElementById('links-list');
  if(!el)return;
  el.innerHTML=formLinks.map((lk,i)=>`
    <div class="link-form-item">
      <input class="lbl-inp" placeholder="Label (e.g. Twitter)" value="${esc(lk.label)}" oninput="formLinks[${i}].label=this.value">
      <input class="url-inp" placeholder="URL" value="${esc(lk.url)}" oninput="formLinks[${i}].url=this.value">
      <button class="lk-rm" onclick="rmLink(${i})">✕</button>
    </div>`).join('');
}
function rmLink(i){formLinks.splice(i,1);renderLinks();}
function addLink(){formLinks.push({label:'',url:''});renderLinks();}

function setShape(s){
  currentShape=s;
  const box=document.getElementById('img-prev-box');
  if(box)box.className='img-preview-box sh-'+s;
  document.querySelectorAll('.shape-opt').forEach(el=>el.classList.toggle('active',el.textContent===s));
}

function syncColor(src){
  if(src==='picker'){
    document.getElementById('f-ctext').value=document.getElementById('f-cpicker').value;
  } else {
    const v=(document.getElementById('f-ctext').value||'').trim();
    if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('f-cpicker').value=v;
  }
}
function clearColor(){document.getElementById('f-ctext').value='';document.getElementById('f-cpicker').value='#7c3aed';}
function getFormColor(){const v=(document.getElementById('f-ctext').value||'').trim();return/^#[0-9a-fA-F]{6}$/.test(v)?v:'';}

function setPreview(src){
  const img=document.getElementById('img-prev');
  const ph=document.getElementById('img-ph');
  if(img){img.src=src||'';img.style.display=src?'block':'none';}
  if(ph)ph.style.display=src?'none':'';
}
function onUrlInput(){setPreview((document.getElementById('f-img-url').value||'').trim());}
function onFileInput(){
  const file=document.getElementById('f-img-file').files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const imgEl=new Image();
    imgEl.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=400;let w=imgEl.width,h=imgEl.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(imgEl,0,0,w,h);
      document.getElementById('f-img-url').value='';
      setPreview(canvas.toDataURL('image/jpeg',.85));
    };
    imgEl.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function getFormImg(){
  const prev=document.getElementById('img-prev');
  if(prev&&prev.style.display!=='none'&&prev.src&&prev.src!==window.location.href)return prev.src;
  return'';
}

function collectForm(){
  return{
    name:(document.getElementById('f-name').value||'').trim(),
    kanji:(document.getElementById('f-kanji').value||'').trim(),
    source:(document.getElementById('f-source').value||'').trim(),
    cat:document.getElementById('f-cat').value,
    affinity:document.getElementById('f-affinity').value,
    birthday:(document.getElementById('f-birthday').value||'').trim(),
    hexColor:getFormColor(),
    img:getFormImg(),
    imgShape:currentShape,
    tags:(document.getElementById('f-tags').value||'').split(',').map(t=>t.trim()).filter(Boolean),
    note:(document.getElementById('f-note').value||'').trim(),
    gallery:[...formGallery],
    links:formLinks.filter(l=>l.url.trim()),
  };
}

function openAdd(){
  const db=getDB();
  currentShape='circle';formGallery=[];formLinks=[];
  showModal(`<div class="modal-title">New entry</div>${formFields(null,db.cats)}
    <div class="btn-row"><button class="btn btn-primary" onclick="saveNew()">Save entry</button><button class="btn" onclick="closeModal()">Cancel</button></div>`,true);
  renderGalItems();renderLinks();
}

function openEdit(id){
  const db=getDB();
  const e=db.entries.find(x=>x.id===id);if(!e)return;
  currentShape=e.imgShape||'circle';
  formGallery=[...(e.gallery||[])];
  formLinks=(e.links||[]).map(l=>({...l}));
  showModal(`<div class="modal-title">Edit entry</div>${formFields(e,db.cats)}
    <div class="btn-row"><button class="btn btn-primary" onclick="saveEdit(${id})">Save changes</button><button class="btn btn-danger" onclick="deleteEntry(${id})">Delete</button></div>`,true);
  renderGalItems();renderLinks();
}

function saveNew(){
  const f=collectForm();if(!f.name){alert('Please enter a name!');return;}
  const db=getDB();db.entries.push({...f,id:db.nextId++});
  saveDB(db);closeModal();render();
}
function saveEdit(id){
  const f=collectForm();if(!f.name){alert('Please enter a name!');return;}
  const db=getDB();const i=db.entries.findIndex(x=>x.id===id);
  if(i>=0)db.entries[i]={...db.entries[i],...f};
  saveDB(db);closeModal();render();
}
function deleteEntry(id){
  if(!confirm('Delete this entry? This cannot be undone.'))return;
  const db=getDB();db.entries=db.entries.filter(x=>x.id!==id);
  saveDB(db);closeModal();render();
}

function openMenu(){
  const db=getDB();
  showModal(`
    <div class="modal-title">Settings & Tools</div>
    <div class="field"><label>Journal title</label><input id="m-title" value="${esc(db.title)}"></div>
    <div class="field"><label>Categories (one per line — add your own!)</label>
      <textarea id="m-cats" style="min-height:140px">${db.cats.map(esc).join('\n')}</textarea></div>
    <div class="btn-row" style="margin-bottom:0"><button class="btn btn-primary" onclick="saveSettings()">Save settings</button></div>
    <hr class="div">
    <div style="font-size:11px;font-weight:600;color:#aaa;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.5rem">Backup & Restore</div>
    <p style="font-size:12px;color:#aaa;margin-bottom:8px">Export regularly to keep your data safe. Import to restore on a new device.</p>
    <div class="settings-row">
      <button class="btn" onclick="exportData()">Export backup (.json)</button>
      <button class="btn" onclick="document.getElementById('imp-input').click()">Import backup</button>
    </div>
    <input type="file" id="imp-input" accept=".json" style="display:none" onchange="importData(event)">`);
}
function saveSettings(){
  const db=getDB();
  db.title=(document.getElementById('m-title').value||'My Journal').trim();
  const rawCats=(document.getElementById('m-cats').value||'').split('\n').map(c=>c.trim()).filter(Boolean);
  db.cats=rawCats.length?rawCats:[...DEFAULT_CATS];
  saveDB(db);closeModal();render();
}
function exportData(){
  const db=getDB();
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='character-journal-backup.json';a.click();URL.revokeObjectURL(a.href);
}
function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!Array.isArray(d.entries))throw new Error();
      if(confirm(`Import ${d.entries.length} entries? This replaces all current data.`)){saveDB(d);closeModal();render();}
    }catch{alert('Could not read backup file.');}
  };
  reader.readAsText(file);
}

function showModal(html,wide){
  document.getElementById('modal-root').innerHTML=`
    <div class="overlay" id="overlay" onclick="overlayClick(event)">
      <div class="modal${wide?' modal-wide':''}" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">✕</button>
        ${html}
      </div>
    </div>`;
}
function closeModal(){document.getElementById('modal-root').innerHTML='';render();}
function overlayClick(e){if(e.target.id==='overlay')closeModal();}

render();
</script>
</body>
</html>
