<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Character Journal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;min-height:100vh;background:#f6f5ff}
.header{background:white;border-bottom:1px solid #ede9fe;padding:.75rem 1rem;position:sticky;top:0;z-index:50}
.header-inner{max-width:960px;margin:0 auto}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.site-title{font-size:18px;font-weight:700;color:#4c1d95;white-space:nowrap;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.tab-nav{display:flex;gap:3px;background:#f0eeff;border-radius:9px;padding:3px;flex-shrink:0}
.tab-btn{padding:6px 16px;border-radius:6px;border:none;background:transparent;font-size:13px;font-weight:500;cursor:pointer;color:#888;transition:all .15s;font-family:inherit;white-space:nowrap}
.tab-btn.active{background:white;color:#4c1d95;box-shadow:0 1px 4px rgba(124,58,237,.15)}
.header-actions{display:flex;gap:8px;flex-shrink:0}
.search-bar{width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;background:white;color:#1a1a1a}
.search-bar:focus{outline:none;border-color:#7c3aed}
.filters{display:flex;gap:6px;flex-wrap:wrap;padding-top:8px}
.pill{padding:5px 13px;border-radius:20px;border:1px solid #e0e0e0;background:white;font-size:12px;color:#666;cursor:pointer;white-space:nowrap;transition:all .15s;-webkit-tap-highlight-color:transparent;font-family:inherit;appearance:none;-webkit-appearance:none;line-height:1.4}
.pill:hover,.pill:active{border-color:#7c3aed;color:#7c3aed}
.pill.active{background:#7c3aed;color:white;border-color:#7c3aed}
/* sub-header inside content */
.content-search{background:white;border-bottom:1px solid #ede9fe;padding:.7rem 1rem}
.content-search-inner{max-width:960px;margin:0 auto}
.main{max-width:960px;margin:0 auto;padding:1rem}
.count-label{font-size:12px;color:#aaa;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(162px,1fr));gap:12px}
.card{background:white;border-radius:14px;padding:1rem;cursor:pointer;border:2px solid #ede9fe;transition:box-shadow .2s,transform .15s;-webkit-tap-highlight-color:transparent}
.card:hover{box-shadow:0 6px 20px rgba(124,58,237,.13);transform:translateY(-2px)}
.card-img{width:72px;height:72px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;overflow:hidden}
.sh-circle{border-radius:50%}.sh-rounded{border-radius:14px}.sh-square{border-radius:4px}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-name{font-size:14px;font-weight:600;text-align:center;margin-bottom:3px;line-height:1.3}
.card-kanji{font-size:13px;color:#888;text-align:center;margin-bottom:7px}
.card-cat-wrap,.card-aff-wrap{text-align:center;margin-bottom:5px}
.badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600;display:inline-block}
.color-dot{width:9px;height:9px;border-radius:50%;display:inline-block;vertical-align:middle;border:1px solid rgba(0,0,0,.1)}
.card-color-row{text-align:center;margin-bottom:5px;font-size:10px;color:#888}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;background:#f5f3ff;color:#7c3aed;border:1px solid #ede9fe}
/* detail */
.detail-page{min-height:100vh;background:white}
.detail-header{background:white;border-bottom:1px solid #ede9fe;padding:.8rem 1rem;position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px}
.back-btn{padding:7px 14px;border-radius:8px;border:1px solid #e0e0e0;background:white;color:#7c3aed;cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap;flex-shrink:0}
.back-btn:hover{background:#f5f3ff}
.detail-header-name{font-size:15px;font-weight:600;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.detail-edit-btn{padding:7px 14px;border-radius:8px;border:1px solid #7c3aed;background:white;color:#7c3aed;cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap;flex-shrink:0}
.detail-edit-btn:hover{background:#f5f3ff}
.detail-body{max-width:720px;margin:0 auto;padding:1.5rem 1rem 3rem}
.detail-hero{border-radius:16px;padding:1.5rem;display:flex;gap:1.25rem;align-items:flex-start}
.detail-avatar{width:100px;height:100px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;overflow:hidden}
.detail-avatar img{width:100%;height:100%;object-fit:cover}
.detail-info{flex:1;min-width:0}
.detail-name{font-size:23px;font-weight:700;line-height:1.2;margin-bottom:4px}
.detail-kanji{font-size:15px;color:#888;margin-bottom:4px}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.detail-meta{font-size:13px;color:#666;margin-bottom:4px}
.detail-section{padding:1rem 0;border-top:1px solid #f0f0f0;margin-top:.5rem}
.section-label{font-size:11px;font-weight:600;color:#aaa;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.6rem}
.detail-note{background:#faf8ff;border:1px solid #ede9fe;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.8;white-space:pre-wrap}
.kanji-info-box{background:#fdfcff;border:1px solid #ede9fe;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.7;white-space:pre-wrap;margin-top:.5rem}
.tags-row{display:flex;gap:5px;flex-wrap:wrap}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.gallery-item{cursor:pointer;border-radius:10px;overflow:hidden;background:transparent;border:1px solid #ede9fe}
.gallery-item:hover .g-thumb{transform:scale(1.03)}
.g-thumb{width:100%;aspect-ratio:1;object-fit:contain;display:block;transition:transform .18s;background:transparent}
.g-caption{font-size:11px;color:#666;padding:5px 8px;line-height:1.4;background:white}
.link-list{display:flex;flex-direction:column;gap:8px}
.link-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#faf8ff;border:1px solid #ede9fe;border-radius:12px;text-decoration:none;color:#1a1a1a;font-size:15px;transition:background .15s}
.link-item:hover{background:#ede9fe}
.link-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.link-label{font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-arr{color:#bbb;font-size:13px}

/* video size control */
.vid-size-row{display:flex;align-items:center;gap:6px;margin-bottom:.75rem;flex-wrap:wrap}
.vid-size-label{font-size:11px;color:#aaa;font-weight:500}
.vid-size-btn{padding:4px 10px;border-radius:6px;border:1px solid #e0e0e0;background:white;font-size:11px;color:#666;cursor:pointer;font-family:inherit;transition:all .15s;line-height:1.4}
.vid-size-btn:hover{border-color:#7c3aed;color:#7c3aed}
.vid-size-btn.active{background:#7c3aed;color:white;border-color:#7c3aed}
.yt-list{display:flex;flex-direction:column;gap:16px}
.yt-list.sz-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.yt-list.sz-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.yt-list.sz-4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.yt-list.sz-2 .yt-label,.yt-list.sz-3 .yt-label,.yt-list.sz-4 .yt-label{font-size:11px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.yt-list.sz-3 .yt-embed,.yt-list.sz-4 .yt-embed{border-radius:7px}
.yt-list.sz-3 .tw-embed,.yt-list.sz-4 .tw-embed{max-width:100%}
.tw-embed{border-radius:12px;overflow:hidden;max-width:550px;margin:0 auto;min-height:60px}
.yt-label{font-size:14px;font-weight:500;color:#555;margin-bottom:8px}
.yt-embed{border-radius:12px;overflow:hidden;background:#000;aspect-ratio:16/9}
.yt-embed iframe{width:100%;height:100%;border:none;display:block}
/* calendar */
.cal-wrap{max-width:960px;margin:0 auto;padding:1rem}
.cal-controls{background:white;border-radius:14px;padding:1rem;margin-bottom:1rem;border:1px solid #ede9fe}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-month-title{font-size:20px;font-weight:700;color:#4c1d95}
.cal-nav-btns{display:flex;gap:6px;align-items:center}
.cal-nav-btn{padding:6px 14px;border-radius:8px;border:1px solid #e0e0e0;background:white;cursor:pointer;font-size:15px;color:#666;font-family:inherit}
.cal-nav-btn:hover{background:#f5f3ff;border-color:#7c3aed}
.cal-today-btn{padding:6px 14px;border-radius:8px;border:1px solid #7c3aed;background:white;cursor:pointer;font-size:12px;font-weight:600;color:#7c3aed;font-family:inherit}
.cal-today-btn:hover{background:#f5f3ff}
.cal-grid-wrap{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:#aaa;padding:5px 0}
.cal-cell{min-height:88px;background:white;border:1px solid #f0eeff;border-radius:9px;padding:5px;overflow:hidden}
.cal-cell.other-month{background:#fafafa;border-color:#f5f5f5}
.cal-cell.today-cell{border:2px solid #7c3aed}
.cal-day-num{font-size:12px;color:#ccc;font-weight:500;margin-bottom:3px}
.cal-cell.today-cell .cal-day-num{color:#7c3aed;font-weight:700}
.cal-chip{font-size:10px;padding:2px 6px;border-radius:20px;margin-bottom:2px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:600;line-height:1.5;-webkit-tap-highlight-color:transparent}
.cal-chip:hover{opacity:.75}
/* notification */
.notif-banner{background:#4c1d95;color:white;padding:.85rem 1rem}
.notif-banner-inner{max-width:960px;margin:0 auto;display:flex;align-items:flex-start;gap:10px}
.notif-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.notif-text{flex:1;font-size:14px;line-height:1.5}
.notif-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.notif-close:hover{color:white}

/* mention chips */
.mention-chip{display:inline-flex;align-items:center;gap:4px;background:#f5f3ff;border:1px solid #ede9fe;border-radius:20px;padding:1px 8px 1px 4px;font-size:0.9em;font-weight:600;color:#7c3aed;cursor:pointer;vertical-align:middle;white-space:nowrap;text-decoration:none;-webkit-tap-highlight-color:transparent;line-height:1.6}
.mention-chip:hover{background:#ede9fe}
.mention-chip-dot{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;overflow:hidden;flex-shrink:0}
.mention-chip-dot img{width:100%;height:100%;object-fit:cover}
/* mention picker */
.mention-picker{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;display:flex;align-items:center;justify-content:center;padding:1rem}
.mention-picker-box{background:white;border-radius:16px;width:100%;max-width:420px;padding:1rem;max-height:80vh;display:flex;flex-direction:column;gap:8px}
.mention-picker-search{padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;background:white;color:#1a1a1a;width:100%}
.mention-picker-search:focus{outline:none;border-color:#7c3aed}
.mention-picker-list{overflow-y:auto;display:flex;flex-direction:column;gap:4px;max-height:50vh}
.mention-picker-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.mention-picker-row:hover,.mention-picker-row:active{background:#f5f3ff}
.mention-picker-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;overflow:hidden}
.mention-picker-avatar img{width:100%;height:100%;object-fit:cover}
.mention-picker-name{font-size:14px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mention-picker-cat{font-size:11px;color:#aaa}
/* @ button next to textareas */
.mention-field-wrap{position:relative}
.mention-at-btn{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:6px;border:1px solid #e0e0e0;background:white;color:#aaa;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-family:inherit;z-index:1;padding:0;-webkit-tap-highlight-color:transparent}
.mention-at-btn:hover{background:#f5f3ff;color:#7c3aed;border-color:#7c3aed}

/* wheel */
.wheel-wrap{max-width:960px;margin:0 auto;padding:1rem}
.wheel-container{display:flex;flex-direction:column;align-items:center;gap:1.5rem}
.wheel-canvas-wrap{position:relative;width:min(440px,90vw);height:min(440px,90vw);flex-shrink:0}
#wheel-canvas{border-radius:50%;display:block;cursor:pointer;filter:drop-shadow(0 6px 24px rgba(124,58,237,.2))}
.wheel-pointer{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:32px;line-height:1;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.wheel-spin-btn{padding:12px 32px;border-radius:12px;border:none;background:#7c3aed;color:white;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;box-shadow:0 4px 14px rgba(124,58,237,.4);touch-action:manipulation}
.wheel-spin-btn:hover{background:#6d28d9}
.wheel-spin-btn:disabled{opacity:.5;cursor:default}
.wheel-result{text-align:center;padding:1rem 1.5rem;background:white;border-radius:14px;border:1px solid #ede9fe;min-width:240px;cursor:pointer;transition:box-shadow .2s}
.wheel-result:hover{box-shadow:0 4px 16px rgba(124,58,237,.13)}
.wheel-result-label{font-size:12px;color:#aaa;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.wheel-result-avatar{width:56px;height:56px;margin:6px auto 8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;overflow:hidden}
.wheel-result-name{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
.wheel-result-sub{font-size:13px;color:#888}
.wheel-empty{text-align:center;padding:3rem 1rem;color:#bbb}
.wheel-filter-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:640px}
/* connections */
.conn-list{display:flex;flex-direction:column;gap:8px}
.conn-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#faf8ff;border:1px solid #ede9fe;border-radius:12px;cursor:pointer;transition:background .15s;color:#1a1a1a}
.conn-item:hover{background:#ede9fe}
.conn-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;overflow:hidden}
.conn-avatar.sh-rounded{border-radius:9px}.conn-avatar.sh-square{border-radius:3px}
.conn-avatar img{width:100%;height:100%;object-fit:cover}
.conn-body{flex:1;min-width:0}
.conn-label{font-size:11px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.conn-name{font-size:14px;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conn-arr{color:#bbb;font-size:13px;flex-shrink:0}
.conn-form-item{display:flex;gap:6px;align-items:center;margin-bottom:8px;padding:8px;background:#faf8ff;border:1px solid #ede9fe;border-radius:9px;flex-wrap:wrap}
.conn-form-item input{width:130px;flex-shrink:0;padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;background:white;color:#1a1a1a}
.conn-form-item input:focus{outline:none;border-color:#7c3aed}
.conn-form-item select{flex:1;min-width:120px;padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;background:white;color:#1a1a1a}
.conn-form-item select:focus{outline:none;border-color:#7c3aed}
.g-artist{font-size:11px;color:#7c3aed;padding:3px 8px 5px;display:flex;align-items:center;gap:4px;cursor:pointer;background:white;transition:background .12s;-webkit-tap-highlight-color:transparent}
.g-artist:hover{background:#f5f3ff}
.g-artist-dot{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;overflow:hidden}
.g-artist-dot img{width:100%;height:100%;object-fit:cover}
/* lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center}
.lb-img-wrap{flex:1;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:grab;position:relative;touch-action:none}
.lb-img-wrap:active{cursor:grabbing}
.lb-img-wrap img{max-width:92vw;max-height:78vh;object-fit:contain;user-select:none;border-radius:6px;pointer-events:none;transition:transform .08s linear}
.lb-toolbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;z-index:502;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent)}
.lb-close{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.lb-dl-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;-webkit-tap-highlight-color:transparent}
.lb-dl-btn:hover{background:rgba(255,255,255,.3)}
.lb-arrow{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.18);border:none;color:white;font-size:36px;width:50px;height:50px;border-radius:50%;cursor:pointer;z-index:501;display:flex;align-items:center;justify-content:center}
.lb-arrow:hover{background:rgba(255,255,255,.3)}
.lb-prev{left:1rem}.lb-next{right:1rem}
.lb-bottom{padding:.75rem 1rem;text-align:center;width:100%}
.lb-caption{color:rgba(255,255,255,.85);font-size:14px;margin-bottom:4px}
.lb-counter{color:rgba(255,255,255,.4);font-size:12px}
.lb-zoom-hint{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-size:11px;pointer-events:none}
.lb-toolbar{position:fixed;top:1rem;left:1rem;display:flex;gap:8px;z-index:502}
.lb-tool-btn{padding:6px 14px;border-radius:20px;background:rgba(255,255,255,.18);border:none;color:white;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.lb-tool-btn:hover{background:rgba(255,255,255,.3)}
/* crop */
.crop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;display:flex;align-items:center;justify-content:center;padding:1rem}
.crop-box{background:white;border-radius:16px;padding:1.25rem;max-width:600px;width:100%}
.crop-box canvas{display:block;max-width:100%;border-radius:8px;cursor:crosshair;touch-action:none}
.crop-hint{font-size:11px;color:#aaa;margin:8px 0 12px;line-height:1.5}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto}
.modal{background:white;border-radius:18px;width:100%;max-width:600px;padding:1.5rem;position:relative;margin:auto}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:22px;cursor:pointer;color:#bbb;line-height:1;padding:0}
.modal-close:hover{color:#555}
.modal-title{font-size:17px;font-weight:700;margin-bottom:1.1rem;color:#4c1d95}
/* form */
.field{margin-bottom:.8rem}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px;font-weight:500}
.field input,.field textarea,.field select{width:100%;padding:8px 11px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;background:white;color:#1a1a1a;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:#7c3aed}
.field textarea{min-height:90px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* height input */
.height-row{display:flex;gap:6px;align-items:center}
.height-row input{flex:1;padding:8px 11px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;background:white;color:#1a1a1a}
.height-row input:focus{outline:none;border-color:#7c3aed}
.height-unit-btns{display:flex;gap:3px;flex-shrink:0}

<script>
/* ═══════════════════════════════════
   CONSTANTS
═══════════════════════════════════ */
const PALETTES=[['#ede9fe','#4c1d95'],['#d1fae5','#064e3b'],['#fce7f3','#831843'],['#fef3c7','#78350f'],['#dbeafe','#1e3a8a'],['#ffe4e6','#881337'],['#f0fdf4','#14532d'],['#fff7ed','#7c2d12'],['#f0f9ff','#0c4a6e'],['#fdf4ff','#581c87'],['#ecfdf5','#022c22'],['#fef9c3','#713f12']];
const AFFINITY=[
  {value:'kamioshi',    label:'神推し — Kamioshi',  short:'神推し',   bg:'#fef3c7',color:'#78350f'},
  {value:'oshi',        label:'推し — Oshi',         short:'推し',     bg:'#ede9fe',color:'#4c1d95'},
  {value:'love',        label:'Love',                short:'Love',     bg:'#fce7f3',color:'#831843'},
  {value:'like',        label:'Like',                short:'Like',     bg:'#dbeafe',color:'#1e3a8a'},
  {value:'pos_neutral', label:'Positive Neutral',    short:'+Neutral', bg:'#d1fae5',color:'#065f46'},
  {value:'true_neutral',label:'True Neutral',        short:'Neutral',  bg:'#f3f4f6',color:'#374151'},
  {value:'neg_neutral', label:'Negative Neutral',    short:'−Neutral', bg:'#fef9c3',color:'#713f12'},
  {value:'dislike',     label:'Dislike',             short:'Dislike',  bg:'#ffedd5',color:'#9a3412'},
  {value:'hate',        label:'Hate',                short:'Hate',     bg:'#fee2e2',color:'#991b1b'},
  {value:'mixed',       label:'Mixed Feelings',      short:'Mixed',    bg:'#faf5ff',color:'#6b21a8'},
];
const DEFAULT_CATS=['VTuber','Streamer','Utaite','Artist','Musician','Anime character','Game character','Fictional character','IRL friend','Online friend','Other'];
const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const NOTIF_OPTS=[{value:'day_of',label:'Day of'},{value:'day_before',label:'Day before'},{value:'week_before',label:'Week before'},{value:'month_before',label:'Month before'}];

/* ═══════════════════════════════════
   INDEXEDDB STORAGE
═══════════════════════════════════ */
let _idb=null, _db=null;

function openIDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('cj_store',1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore('data');
    req.onsuccess=e=>{res(e.target.result);};
    req.onerror=()=>rej(req.error);
  });
}
function idbGet(key){
  return new Promise((res)=>{
    try{const tx=_idb.transaction('data','readonly');const req=tx.objectStore('data').get(key);req.onsuccess=()=>res(req.result||null);req.onerror=()=>res(null);}catch(e){res(null);}
  });
}
function idbPut(key,val){
  return new Promise((res,rej)=>{
    try{const tx=_idb.transaction('data','readwrite');tx.objectStore('data').put(val,key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);}catch(e){rej(e);}
  });
}
function emptyDB(){return{entries:[],cats:[...DEFAULT_CATS],title:'My Journal',nextId:1,dismissedNotifs:[]};}

async function initDB(){
  try{
    _idb=await openIDB();
    const d=await idbGet('main');
    if(d){_db=d;}
    else{
      // migrate from localStorage
      try{const ls=localStorage.getItem('cj_v3');_db=ls?JSON.parse(ls):emptyDB();}
      catch(e){_db=emptyDB();}
      await idbPut('main',_db);
    }
  }catch(e){
    try{_db=JSON.parse(localStorage.getItem('cj_v3')||'null')||emptyDB();}
    catch(e2){_db=emptyDB();}
  }
  if(!Array.isArray(_db.entries))_db.entries=[];
  if(!Array.isArray(_db.cats))_db.cats=[...DEFAULT_CATS];
  if(!_db.title)_db.title='My Journal';
  if(typeof _db.nextId!=='number')_db.nextId=1;
  if(!_db.dismissedNotifs)_db.dismissedNotifs=[];
}
function getDB(){return _db;}
function saveDB(d){
  _db=d;
  if(_idb){
    idbPut('main',d).catch(err=>{
      try{localStorage.setItem('cj_v3',JSON.stringify(d));}catch(e){}
    });
  }else{
    try{localStorage.setItem('cj_v3',JSON.stringify(d));}catch(e){}
  }
}

/* ═══════════════════════════════════
   HELPERS
═══════════════════════════════════ */
function initials(n){return(n||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();}
function pal(id){return PALETTES[(id||0)%PALETTES.length];}
function catPal(cat,cats){const i=cats.indexOf(cat);return PALETTES[(i>=0?i:0)%PALETTES.length];}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function affData(v){return AFFINITY.find(a=>a.value===v)||null;}
function ytId(url){const m=(url||'').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?/\s]+)/);return m?m[1]:null;}
function tweetId(url){const m=(url||'').match(/(?:twitter\.com|x\.com)\/[^/]+\/status\/([\d]+)/);return m?m[1]:null;}
function isEmbeddable(url){return !!(ytId(url)||tweetId(url));}
function lkIcon(url){if(ytId(url))return'▶';if(tweetId(url))return'▶';if(/twitter\.com|x\.com/.test(url))return'𝕏';if(/instagram\.com/.test(url))return'📷';if(/tiktok\.com/.test(url))return'♪';if(/twitch\.tv/.test(url))return'🎮';if(/spotify\.com/.test(url))return'♫';return'🔗';}
function normGal(g){if(!Array.isArray(g))return[];return g.map(x=>typeof x==='string'?{src:x,caption:'',artistId:null,artistLabel:''}:{src:x.src||'',caption:x.caption||'',artistId:x.artistId||null,artistLabel:x.artistLabel||''});}
function checkAlpha(c){try{const d=c.getContext('2d').getImageData(0,0,Math.min(c.width,80),Math.min(c.height,80)).data;for(let i=3;i<d.length;i+=4)if(d[i]<250)return true;}catch(e){}return false;}
function toDataUrl(c){return checkAlpha(c)?c.toDataURL('image/png'):c.toDataURL('image/jpeg',.94);}
function resizeEncode(img,maxPx){let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);return toDataUrl(c);}
function contrastColor(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)/255>0.55?'#1a1a1a':'#ffffff';}
function cmToFt(cm){const i=cm/2.54;const ft=Math.floor(i/12);const inch=Math.round(i%12);return`${ft}'${inch}"`;}
function heightDisplay(cm){if(!cm)return'';return`${cm} cm / ${cmToFt(cm)}`;}
function parseBirthday(str){
  if(!str)return null;
  const MON=['january','february','march','april','may','june','july','august','september','october','november','december'];
  const s=str.trim().toLowerCase().replace(/[,]/g,'');
  const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})/);
  if(m){const mo=parseInt(m[1]),d=parseInt(m[2]);if(mo>=1&&mo<=12&&d>=1&&d<=31)return{month:mo,day:d};}
  for(let i=0;i<MON.length;i++){
    if(s.includes(MON[i].slice(0,3))){const dm=s.match(/(\d{1,2})/);if(dm){const d=parseInt(dm[1]);if(d>=1&&d<=31)return{month:i+1,day:d};}}
  }
  return null;
}
function calcAge(birthYear,birthday,freezeAge){
  if(!birthYear)return null;
  const now=new Date();
  const rawAge=now.getFullYear()-parseInt(birthYear);
  if(rawAge<0)return null;
  if(freezeAge||!birthday)return rawAge;
  const bd=parseBirthday(birthday);if(!bd)return rawAge;
  let age=rawAge;
  if(now<new Date(now.getFullYear(),bd.month-1,bd.day))age--;
  return age>=0?age:null;
}
function daysUntilBirthday(bd){
  const today=new Date();today.setHours(0,0,0,0);
  let bday=new Date(today.getFullYear(),bd.month-1,bd.day);
  if(bday<today)bday=new Date(today.getFullYear()+1,bd.month-1,bd.day);
  return Math.round((bday-today)/864e5);
}

/* ═══════════════════════════════════
   BIRTHDAY NOTIFICATIONS
═══════════════════════════════════ */
function checkBirthdayNotifications(){
  const db=getDB();const year=new Date().getFullYear();const alerts=[];
  db.entries.forEach(e=>{
    if(!e.birthday||!Array.isArray(e.notifOptions)||!e.notifOptions.length)return;
    const bd=parseBirthday(e.birthday);if(!bd)return;
    const days=daysUntilBirthday(bd);
    e.notifOptions.forEach(opt=>{
      const thr=opt==='day_of'?0:opt==='day_before'?1:opt==='week_before'?7:30;
      if(days!==thr)return;
      const key=`${e.id}_${opt}_${year}`;
      if(db.dismissedNotifs.includes(key))return;
      const msg=days===0?`Today is ${e.name}'s birthday! 🎉`:days===1?`${e.name}'s birthday is tomorrow!`:`${e.name}'s birthday is in ${days} days (${MONTH_NAMES[bd.month-1]} ${bd.day})`;
      alerts.push({key,msg,id:e.id});
    });
  });
  if(!alerts.length)return;
  document.getElementById('notif-banner-root').innerHTML=`<div class="notif-banner"><div class="notif-banner-inner">
    <span class="notif-icon">🎂</span>
    <div class="notif-text">${alerts.map(a=>`<div style="cursor:pointer;margin-bottom:2px" onclick="go('detail',${a.id})">${esc(a.msg)}</div>`).join('')}</div>
    <button class="notif-close" onclick="dismissNotifs(${JSON.stringify(alerts.map(a=>a.key))})">✕</button>
  </div></div>`;
  if('Notification' in window&&Notification.permission==='granted'){
    alerts.forEach(a=>{try{new Notification('My Character Journal',{body:a.msg});}catch(e){}});
  }
}
function dismissNotifs(keys){
  const db=getDB();
  const y=new Date().getFullYear()+'';
  keys.forEach(k=>{if(!db.dismissedNotifs.includes(k))db.dismissedNotifs.push(k);});
  db.dismissedNotifs=db.dismissedNotifs.filter(k=>k.includes('_'+y));
  saveDB(db);
  document.getElementById('notif-banner-root').innerHTML='';
}

/* ═══════════════════════════════════
   APP STATE
═══════════════════════════════════ */
const _now=new Date();
const S={view:'grid',id:null,fromCal:false,filter:'All',search:'',calYear:_now.getFullYear(),calMonth:_now.getMonth()+1,calSearch:'',calCatFilter:'All',wheelCat:'All',wheelTags:[],wheelTagMode:'or',wheelSpin:null};
const F={gallery:[],links:[],connections:[],shape:'circle',heightUnit:'cm'};
let cropData=null,lbState=null;

/* ═══════════════════════════════════
   RENDERING — SPLIT HEADER / CONTENT
   Header is rendered once per tab switch.
   Search/filter only re-render cards.
═══════════════════════════════════ */
function renderHeader(){
  if(S.view==='detail')return; // detail has its own header inside content
  const db=getDB();
  const activeTab=S.view==='calendar'?'calendar':S.view==='wheel'?'wheel':'journal';
  document.getElementById('app-header').innerHTML=`<div class="header"><div class="header-inner">
    <div class="header-top">
      <div class="site-title">✦ ${esc(db.title)}</div>
      <div class="tab-nav">
        <button class="tab-btn${activeTab==='journal'?' active':''}" onclick="switchTab('journal')">Journal</button>
        <button class="tab-btn${activeTab==='calendar'?' active':''}" onclick="switchTab('calendar')">Calendar</button>
        <button class="tab-btn${activeTab==='wheel'?' active':''}" onclick="switchTab('wheel')">Wheel</button>
      </div>
      <div class="header-actions">
        <button class="add-btn" onclick="openAdd()">+ Add</button>
        <button class="menu-btn" onclick="openMenu()">⋯</button>
      </div>
    </div>
  </div></div>`;
}

function renderContent(){
  if(S.view==='detail'){
    document.getElementById('app-header').innerHTML='';
    document.getElementById('app-content').innerHTML=detailPageHTML(S.id);
  }else if(S.view==='calendar'){
    document.getElementById('app-content').innerHTML=calPageHTML();
  }else if(S.view==='wheel'){
    document.getElementById('app-content').innerHTML=wheelPageHTML();
    setTimeout(()=>{const entries=wheelEntries();if(entries.length>=2)drawWheel(0,entries);},0);
  }else{
    document.getElementById('app-content').innerHTML=gridPageHTML();
  }
}


function renderApp(){renderHeader();renderContent();}

function switchTab(tab){
  S.view=tab==='calendar'?'calendar':tab==='wheel'?'wheel':'grid';
  renderApp();window.scrollTo(0,0);
}

function go(view,id,fromCal){
  S.view=view;S.id=id||null;S.fromCal=!!fromCal;
  renderApp();window.scrollTo(0,0);
}

/* ═══════════════════════════════════
   GRID PAGE — partial card update
═══════════════════════════════════ */
function filterEntries(){
  const db=getDB();const q=(S.search||'').toLowerCase();
  return db.entries.filter(e=>{
    if(S.filter!=='All'&&e.cat!==S.filter)return false;
    if(!q)return true;
    return[e.name,e.kanji,e.source,e.note,...(e.tags||[])].join(' ').toLowerCase().includes(q);
  });
}

function cardHTML(e,cats){
  const sh=e.imgShape||'circle';
  const[bg,fg]=e.hexColor?[e.hexColor+'22',e.hexColor]:pal(e.id);
  const[cbg,cfg]=catPal(e.cat,cats);
  const aff=affData(e.affinity);
  const age=calcAge(e.birthYear,e.birthday,e.freezeAge);
  const av=e.img?`<img src="${esc(e.img)}" alt="" onerror="this.style.display='none'">`:'';

function updateCalGridOnly(){
  const db=getDB();const year=S.calYear,month=S.calMonth;
  const q=(S.calSearch||'').toLowerCase();
  const usedCats=[...new Set(db.entries.map(e=>e.cat))];
  if(!['All',...usedCats].includes(S.calCatFilter))S.calCatFilter='All';
  // update pill active states
  document.querySelectorAll('#cal-pills .pill').forEach(p=>{
    p.classList.toggle('active',p.dataset.f===S.calCatFilter);
  });
  const withBdays=db.entries.filter(e=>{
    if(!parseBirthday(e.birthday))return false;
    if(S.calCatFilter!=='All'&&e.cat!==S.calCatFilter)return false;
    if(!q)return true;
    return[e.name,e.kanji,e.source,...(e.tags||[])].join(' ').toLowerCase().includes(q);
  });
  const dayMap={};
  withBdays.forEach(e=>{const bd=parseBirthday(e.birthday);if(bd&&bd.month===month){if(!dayMap[bd.day])dayMap[bd.day]=[];dayMap[bd.day].push(e);}});
  const firstDow=new Date(year,month-1,1).getDay();
  const daysInM=new Date(year,month,0).getDate();
  const prevDays=new Date(year,month-1,0).getDate();
  const isThisMonth=_now.getMonth()+1===month&&_now.getFullYear()===year;
  const todayD=_now.getDate();
  let cells=DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<firstDow;i++)cells+=`<div class="cal-cell other-month"><div class="cal-day-num">${prevDays-firstDow+1+i}</div></div>`;
  for(let d=1;d<=daysInM;d++){
    const isToday=isThisMonth&&d===todayD;
    const chips=(dayMap[d]||[]).map(e=>{
      const bg=e.hexColor||'#7c3aed';const fg=e.hexColor?contrastColor(e.hexColor):'#fff';
      const age=calcAge(e.birthYear,e.birthday,e.freezeAge);
      const ageStr=age!==null?` (${e.freezeAge?age:age+1})`:'';
      return`<span class="cal-chip" style="background:${bg};color:${fg}" onclick="go('detail',${e.id},true)">${esc(e.name)}${ageStr}</span>`;
    }).join('');
    cells+=`<div class="cal-cell${isToday?' today-cell':''}"><div class="cal-day-num">${d}</div>${chips}</div>`;
  }
  const total=firstDow+daysInM;const rem=total%7===0?0:7-total%7;
  for(let i=1;i<=rem;i++)cells+=`<div class="cal-cell other-month"><div class="cal-day-num">${i}</div></div>`;
  const el=document.getElementById('cal-grid-wrap');
  if(el)el.innerHTML=cells;
  const titleEl=document.getElementById('cal-month-title');
  if(titleEl)titleEl.textContent=`${MONTH_NAMES[month-1]} ${year}`;
}

function openLB(entryId,startIdx){const db=getDB();const e=db.entries.find(x=>x.id===entryId);if(!e)return;lbState={gallery:normGal(e.gallery),entryRef:entryId,idx:startIdx,zoom:1,panX:0,panY:0};renderLB();}

function renderLB(){
  if(!lbState)return;
  const{gallery,idx,zoom,panX,panY}=lbState;const item=gallery[idx];
  document.getElementById('lb-root').innerHTML=`<div class="lb" id="lb-main">
    <button class="lb-close" onclick="closeLB()">✕</button>
    <div class="lb-toolbar"><button class="lb-tool-btn" onclick="lbDownload()" title="Save image">↓ Save</button></div>
    <div class="lb-img-wrap" id="lb-wrap">
      <img id="lb-img" src="${esc(item.src)}" draggable="false" alt=""
        style="transform:scale(${zoom}) translate(${panX/zoom}px,${panY/zoom}px);max-width:92vw;max-height:78vh;object-fit:contain;border-radius:6px;display:block;touch-action:none;-webkit-touch-callout:default;-webkit-user-select:none;user-select:none">
    </div>
    ${gallery.length>1?`<button class="lb-arrow lb-prev" onclick="lbNav(-1)">‹</button><button class="lb-arrow lb-next" onclick="lbNav(1)">›</button>`:''}
    <div class="lb-bottom">
      ${item.caption?`<div class="lb-caption">${renderMentions(item.caption)}</div>`:''}
      ${item.artistId?(()=>{const a=getDB().entries.find(x=>x.id===item.artistId);if(!a)return'';const lbl=item.artistLabel||'Linked';return`<div class="lb-caption" style="cursor:pointer;opacity:.7;font-size:12px" onclick="closeLB();go('detail',${a.id})">${esc(lbl)}: ${esc(a.name)}</div>`;})():''}
      ${gallery.length>1?`<div class="lb-counter">${idx+1} / ${gallery.length}</div>`:''}
    </div>
    <div class="lb-zoom-hint">Scroll/pinch to zoom · drag to pan · long-press image to save</div>
  </div>`;

  const wrap=document.getElementById('lb-wrap');
  const imgEl=document.getElementById('lb-img');
  const main=document.getElementById('lb-main');

  // scroll to zoom (desktop)
  wrap.addEventListener('wheel',ev=>{
    ev.preventDefault();
    lbState.zoom=Math.max(1,Math.min(7,lbState.zoom+(ev.deltaY>0?-.35:.35)));
    if(lbState.zoom===1){lbState.panX=0;lbState.panY=0;}
    updateLBImg();
  },{passive:false});

  // mouse drag (desktop)
  let md=null;
  wrap.addEventListener('mousedown',ev=>{if(lbState.zoom<=1||ev.button!==0)return;ev.preventDefault();md={sx:ev.clientX-lbState.panX,sy:ev.clientY-lbState.panY};});
  const mM=ev=>{if(!md)return;didDrag=true;lbState.panX=ev.clientX-md.sx;lbState.panY=ev.clientY-md.sy;updateLBImg();wrap.style.cursor='grabbing';};
  let didDrag=false;
  const mU=()=>{if(md&&didDrag)wrap.dataset.suppClick='1';md=null;didDrag=false;wrap.style.cursor=lbState.zoom>1?'grab':'default';};
  window.addEventListener('mousemove',mM);window.addEventListener('mouseup',mU);

  // touch: pinch-zoom + pan + swipe nav
  let tS=null,pinching=false,pDist0=0,pZoom0=1;
  function dist2(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy);}

  main.addEventListener('touchstart',ev=>{
    if(ev.touches.length===2){
      pinching=true;pDist0=dist2(ev.touches);pZoom0=lbState.zoom;
      ev.preventDefault(); // stop browser pinch-zoom
    }else{
      tS={x:ev.touches[0].clientX,y:ev.touches[0].clientY,px:lbState.panX,py:lbState.panY,t:Date.now()};
      pinching=false;
    }
  },{passive:false});

  main.addEventListener('touchmove',ev=>{
    if(ev.touches.length===2&&pinching){
      ev.preventDefault();
      lbState.zoom=Math.max(1,Math.min(7,pZoom0*(dist2(ev.touches)/pDist0)));
      if(lbState.zoom===1){lbState.panX=0;lbState.panY=0;}
      updateLBImg();
    }else if(ev.touches.length===1&&tS&&lbState.zoom>1){
      ev.preventDefault();
      lbState.panX=tS.px+(ev.touches[0].clientX-tS.x);
      lbState.panY=tS.py+(ev.touches[0].clientY-tS.y);
      updateLBImg();
    }
  },{passive:false});

  main.addEventListener('touchend',ev=>{
    if(!pinching&&tS&&lbState.zoom<=1&&gallery.length>1){
      const dx=ev.changedTouches[0].clientX-tS.x;
      if(Math.abs(dx)>50&&Date.now()-tS.t<400)lbNav(dx>0?-1:1);
    }
    if(ev.touches.length<2)pinching=false;
    tS=null;
  },{passive:true});
  main.addEventListener('touchcancel',()=>{pinching=false;tS=null;},{passive:true});

  // close on bg click
  main.addEventListener('click',ev=>{if(ev.target===wrap&&wrap.dataset.suppClick){delete wrap.dataset.suppClick;return;}if(ev.target===main||ev.target===wrap)closeLB();});

  // keyboard
  lbState._kh=ev=>{if(ev.key==='ArrowLeft')lbNav(-1);else if(ev.key==='ArrowRight')lbNav(1);else if(ev.key==='Escape')closeLB();};
  document.addEventListener('keydown',lbState._kh);
  lbState._cl=()=>{window.removeEventListener('mousemove',mM);window.removeEventListener('mouseup',mU);if(lbState._kh)document.removeEventListener('keydown',lbState._kh);};
}

function lbDownload(){
  if(!lbState)return;
  const src=lbState.gallery[lbState.idx]?.src;if(!src)return;
  const a=document.createElement('a');
  if(src.startsWith('data:')){
    // uploaded image — direct download
    a.href=src;
    const ext=src.startsWith('data:image/png')?'png':'jpg';
    a.download=`image.${ext}`;
    a.click();
  }else{
    // external URL — open in new tab so user can save from there
    window.open(src,'_blank','noopener');
  }
}

function updateLBImg(){const img=document.getElementById('lb-img');if(img)img.style.transform=`scale(${lbState.zoom}) translate(${lbState.panX/lbState.zoom}px,${lbState.panY/lbState.zoom}px)`;}
function lbNav(dir){if(!lbState)return;if(lbState._cl)lbState._cl();const n=lbState.gallery.length;lbState.idx=(lbState.idx+dir+n)%n;lbState.zoom=1;lbState.panX=0;lbState.panY=0;renderLB();}
function closeLB(){if(lbState&&lbState._cl)lbState._cl();document.getElementById('lb-root').innerHTML='';lbState=null;}

/* ═══════════════════════════════════

═══════════════════════════════════ */
function initCrop(imgSrc,callback){
  document.getElementById('crop-root').innerHTML=`<div class="crop-overlay"><div class="crop-box">
    <div style="font-size:15px;font-weight:600;margin-bottom:10px">Crop image</div>
    <canvas id="crop-canvas"></canvas>
    <div class="crop-hint">Drag to draw · drag inside to move · drag corners to resize</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="cropApply()">Crop & use</button>
      <button class="btn" style="flex:1" onclick="cropSkip()">Use full image</button>
      <button class="btn" onclick="cropCancel()">Cancel</button>
    </div>
  </div></div>`;
  const canvas=document.getElementById('crop-canvas');
  const img=new Image();
  img.onload=()=>{
    const maxW=Math.min(540,window.innerWidth-64),maxH=Math.min(480,window.innerHeight-260);
    const scale=Math.min(maxW/img.width,maxH/img.height,1);
    const cw=Math.round(img.width*scale),ch=Math.round(img.height*scale);
    canvas.width=cw;canvas.height=ch;
    const HS=12;let rect={x:0,y:0,w:cw,h:ch},drag=null;
    cropData={img,scale,callback,get rect(){return rect;}};
    function draw(){const ctx=canvas.getContext('2d');ctx.clearRect(0,0,cw,ch);ctx.drawImage(img,0,0,cw,ch);ctx.fillStyle='rgba(0,0,0,.53)';ctx.fillRect(0,0,cw,ch);const{x,y,w,h}=rect;if(w>0&&h>0){ctx.clearRect(x,y,w,h);ctx.drawImage(img,x/scale,y/scale,w/scale,h/scale,x,y,w,h);ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.strokeRect(x,y,w,h);ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=.5;[1/3,2/3].forEach(t=>{ctx.beginPath();ctx.moveTo(x+w*t,y);ctx.lineTo(x+w*t,y+h);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y+h*t);ctx.lineTo(x+w,y+h*t);ctx.stroke();});ctx.fillStyle='white';[[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([hx,hy])=>ctx.fillRect(hx-HS/2,hy-HS/2,HS,HS));}}
    function pos(e){const r=canvas.getBoundingClientRect(),cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;return[(cx-r.left)*cw/r.width,(cy-r.top)*ch/r.height];}
    function hit(mx,my){const{x,y,w,h}=rect;for(const[hx,hy,n]of[[x,y,'nw'],[x+w,y,'ne'],[x,y+h,'sw'],[x+w,y+h,'se']])if(Math.abs(mx-hx)<=HS+2&&Math.abs(my-hy)<=HS+2)return n;if(mx>x&&mx<x+w&&my>y&&my<y+h)return'move';return'new';}
    const onDown=e=>{e.preventDefault();const[mx,my]=pos(e);drag={type:hit(mx,my),sx:mx,sy:my,sr:{...rect}};};
    const onMove=e=>{if(!drag)return;e.preventDefault();const[mx,my]=pos(e),dx=mx-drag.sx,dy=my-drag.sy;let{x,y,w,h}=drag.sr;if(drag.type==='new'){x=Math.min(drag.sx,mx);y=Math.min(drag.sy,my);w=Math.abs(mx-drag.sx);h=Math.abs(my-drag.sy);}else if(drag.type==='move'){x=Math.max(0,Math.min(cw-w,drag.sr.x+dx));y=Math.max(0,Math.min(ch-h,drag.sr.y+dy));}else{if(drag.type.includes('e'))w=Math.max(20,drag.sr.w+dx);if(drag.type.includes('s'))h=Math.max(20,drag.sr.h+dy);if(drag.type.includes('w')){const nx=Math.min(drag.sr.x+drag.sr.w-20,drag.sr.x+dx);w=drag.sr.x+drag.sr.w-nx;x=nx;}if(drag.type.includes('n')){const ny=Math.min(drag.sr.y+drag.sr.h-20,drag.sr.y+dy);h=drag.sr.y+drag.sr.h-ny;y=ny;}}x=Math.max(0,x);y=Math.max(0,y);w=Math.min(cw-x,Math.max(20,w));h=Math.min(ch-y,Math.max(20,h));rect={x,y,w,h};draw();};
    const onUp=()=>drag=null;
    canvas.addEventListener('mousedown',onDown);canvas.addEventListener('mousemove',onMove);canvas.addEventListener('mouseup',onUp);
    canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp);
    draw();
  };
  img.crossOrigin='anonymous';img.src=imgSrc;
}
function cropApply(){if(!cropData)return;const{img,scale,callback,rect}=cropData;const nx=Math.round(rect.x/scale),ny=Math.round(rect.y/scale),nw=Math.max(1,Math.round(rect.w/scale)),nh=Math.max(1,Math.round(rect.h/scale));const out=document.createElement('canvas');out.width=nw;out.height=nh;out.getContext('2d').drawImage(img,nx,ny,nw,nh,0,0,nw,nh);document.getElementById('crop-root').innerHTML='';cropData=null;callback(toDataUrl(out));}
function cropSkip(){if(!cropData)return;const{img,callback}=cropData;document.getElementById('crop-root').innerHTML='';cropData=null;callback(resizeEncode(img,1400));}
function cropCancel(){document.getElementById('crop-root').innerHTML='';cropData=null;}

function switchHeightUnit(unit){
  F.heightUnit=unit;
  const cmInp=document.getElementById('f-height-cm');
  const ftInp=document.getElementById('f-height-ft');
  const inInp=document.getElementById('f-height-in');
  if(unit==='ft'){
    // convert cm → ft+in
    const cm=parseInt(cmInp?.value||'0');
    if(cm>0){const totalIn=cm/2.54;ftInp.value=Math.floor(totalIn/12);inInp.value=Math.round(totalIn%12);}
    if(cmInp)cmInp.style.display='none';
    if(ftInp)ftInp.style.display='block';
    if(inInp)inInp.style.display='block';
  }else{
    // convert ft+in → cm
    const ft=parseInt(ftInp?.value||'0')||0;const inch=parseInt(inInp?.value||'0')||0;
    const cm=Math.round((ft*12+inch)*2.54);
    if(cm>0&&cmInp)cmInp.value=cm;
    if(cmInp)cmInp.style.display='block';
    if(ftInp)ftInp.style.display='none';
    if(inInp)inInp.style.display='none';
  }
  document.getElementById('hbtn-cm')?.classList.toggle('active',unit==='cm');
  document.getElementById('hbtn-ft')?.classList.toggle('active',unit==='ft');
}

function getFormHeight(){
  if(F.heightUnit==='ft'){
    const ft=parseInt(document.getElementById('f-height-ft')?.value||'0')||0;
    const inch=parseInt(document.getElementById('f-height-in')?.value||'0')||0;
    const cm=Math.round((ft*12+inch)*2.54);return cm>0?cm:null;
  }else{
    const v=parseInt(document.getElementById('f-height-cm')?.value||'');return v>0?v:null;
  }
}

/* ── WHEEL ── */
function wheelEntries(){
  const db=getDB();
  return db.entries.filter(e=>{
    if(S.wheelCat!=='All'&&e.cat!==S.wheelCat)return false;
    if(S.wheelTags.length>0){
      const et=e.tags||[];
      if(S.wheelTagMode==='and'){
        if(!S.wheelTags.every(t=>et.includes(t)))return false;
      }else{
        if(!S.wheelTags.some(t=>et.includes(t)))return false;
      }
    }
    return true;
  });
}

function toggleWheelTag(tag){
  const i=S.wheelTags.indexOf(tag);
  if(i>=0)S.wheelTags.splice(i,1);else S.wheelTags.push(tag);
  S.wheelSpin=null;renderApp();
}

  </div></div>

let _wheelAnim=null;
function spinWheel(){
  const entries=wheelEntries();
  if(entries.length<2)return;
  const btn=document.getElementById('wheel-spin-btn');
  if(btn)btn.disabled=true;
  const n=entries.length;
  const slice=(2*Math.PI)/n;
  const targetIdx=Math.floor(Math.random()*n);
  // Pointer is at top = -π/2. Slice i center = angle + i*slice - π/2 + slice/2.
  // We want slice center = -π/2, so: angle = -(i*slice + slice/2).
  // Add full rotations for spin effect.
  // Pointer at canvas top = angle -π/2. Slice i center = curAngle+i*slice-π/2+slice/2.
  // For targetIdx center at -π/2: curAngle = -(targetIdx*slice+slice/2) mod 2π
  const landAngle=((-(targetIdx*slice+slice/2))%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const spins=2*Math.PI*(8+Math.floor(Math.random()*5));
  const targetAngle=spins+landAngle;
  let start=null;
  const duration=4200;
  let curAngle=0;
  function easeOut(t){return 1-Math.pow(1-t,4);}
  function frame(ts){
    if(!start)start=ts;
    const t=Math.min((ts-start)/duration,1);
    curAngle=easeOut(t)*targetAngle;
    drawWheel(curAngle,entries);
    if(t<1){_wheelAnim=requestAnimationFrame(frame);}
    else{
      drawWheel(targetAngle,entries);
      S.wheelSpin=targetIdx;
      const container=document.querySelector('.wheel-container');
      if(container){
        const old=container.querySelector('.wheel-result');if(old)old.remove();
        const e=entries[targetIdx];
        const[bg,fg]=e.hexColor?[e.hexColor+'22',e.hexColor]:pal(e.id);
        const sh=e.imgShape||'circle';
        const av=e.img?`<img src="${esc(e.img)}" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:'';
        const div=document.createElement('div');div.className='wheel-result';div.onclick=()=>go('detail',e.id);
        div.innerHTML=`<div class="wheel-result-label">You got\u2026</div>
          <div class="wheel-result-avatar sh-${sh}" style="background:${bg};color:${fg}">${av||initials(e.name)}</div>
          <div class="wheel-result-name">${esc(e.name)}</div>
          ${e.cat?`<div class="wheel-result-sub">${esc(e.cat)}</div>`:''}
          <div style="font-size:11px;color:#aaa;margin-top:4px">Tap to open profile \u2192</div>`;
        container.appendChild(div);
      }
      if(btn)btn.disabled=false;
    }
  }
  _wheelAnim=requestAnimationFrame(frame);
}

function drawWheel(angle,entries){
  const canvas=document.getElementById('wheel-canvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,cy=W/2,r=cy-4,n=entries.length,slice=(2*Math.PI)/n;
  ctx.clearRect(0,0,W,W);
  entries.forEach((e,i)=>{
    const a0=angle+i*slice-Math.PI/2,a1=a0+slice;
    ctx.beginPath();ctx.moveTo(cy,cy);ctx.arc(cy,cy,r,a0,a1);ctx.closePath();
    ctx.fillStyle=e.hexColor||PALETTES[i%PALETTES.length][0];ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.save();ctx.translate(cy,cy);ctx.rotate(a0+slice/2);
    ctx.textAlign='right';
    const bg=e.hexColor||PALETTES[i%PALETTES.length][0];
    ctx.fillStyle=contrastColor(bg);
    ctx.font=`bold ${Math.max(10,Math.min(14,260/n))}px -apple-system,sans-serif`;
    ctx.shadowColor='rgba(0,0,0,.2)';ctx.shadowBlur=2;
    const name=e.name.length>18?e.name.slice(0,16)+'\u2026':e.name;
    ctx.fillText(name,r-10,4);ctx.restore();
  });
  ctx.beginPath();ctx.arc(cy,cy,26,0,Math.PI*2);
  ctx.fillStyle='white';ctx.fill();ctx.strokeStyle='#ede9fe';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#7c3aed';ctx.font='bold 13px -apple-system,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('\u2736',cy,cy);
}

const MENTION_RE=/\[\[([^\]|]+)\|(\d+)\]\]/g;

function renderMentions(text){
  if(!text)return'';
  const db=getDB();
  return esc(text).replace(/\[\[([^\]|]+)\|(\d+)\]\]/g,(match,name,id)=>{
    const e=db.entries.find(x=>x.id===parseInt(id));
    if(!e)return esc(name);
    const[bg,fg]=e.hexColor?[e.hexColor+'22',e.hexColor]:pal(e.id);
    const av=e.img?`<img src="${esc(e.img)}" alt="" onerror="this.style.display='none'">`:'';
    return `<span class="mention-chip" onclick="go('detail',${e.id})"><span class="mention-chip-dot" style="background:${bg};color:${fg}">${av||initials(e.name)}</span>${esc(e.name)}</span>`;
  });
}

function renderMentionList(q){
  const db=getDB();
  const list=q?db.entries.filter(e=>[e.name,e.kanji,e.cat].join(' ').toLowerCase().includes(q.toLowerCase())):db.entries;
  document.getElementById('mpick-list').innerHTML=list.slice(0,40).map(e=>{
    const[bg,fg]=e.hexColor?[e.hexColor+'22',e.hexColor]:pal(e.id);
    const av=e.img?`<img src="${esc(e.img)}" alt="" onerror="this.style.display='none'">`:'';
    return`<div class="mention-picker-row" onclick="insertMention(${e.id},'${esc(e.name).replace(/'/g,"\\'")}')">

    </div>`;

}
function insertMention(id,name){
  document.getElementById('mention-picker-root').innerHTML='';
  const tag=`[[${name}|${id}]]`;
  const el=document.getElementById(_mentionTarget);
  if(!el)return;
  const s=el.selectionStart||el.value.length;
  const e2=el.selectionEnd||el.value.length;
  el.value=el.value.slice(0,s)+tag+el.value.slice(e2);
  el.selectionStart=el.selectionEnd=s+tag.length;
  el.focus();
  // trigger oninput handlers for gallery captions
  el.dispatchEvent(new Event('input',{bubbles:true}));
}

function saveSettings(){
  const db=getDB();
  db.title=(document.getElementById('m-title').value||'My Journal').trim();
  const rawCats=(document.getElementById('m-cats').value||'').split('\n').map(c=>c.trim()).filter(Boolean);
  db.cats=rawCats.length?rawCats:[...DEFAULT_CATS];
  saveDB(db);closeModal();
}

function exportData(){
  const db=getDB();
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='character-journal-backup.json';a.click();URL.revokeObjectURL(a.href);
}

async function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onerror=()=>alert('Could not read the file. Try again.');
  reader.onload=async e=>{
    try{
      let text=(e.target.result||'');
      // strip BOM (iOS adds this silently)
      text=text.replace(/^\uFEFF/,'').replace(/^\u00EF\u00BB\u00BF/,'').trim();
      if(text.startsWith('"')&&text.endsWith('"')){try{text=JSON.parse(text);}catch(e){}}
      let d;
      try{d=JSON.parse(text);}
      catch(pe){alert('File could not be read as JSON.\n\nMake sure you are opening the .json file exported from this app.\n\nError: '+pe.message);return;}
      if(!d||!Array.isArray(d.entries)){alert('This does not look like a valid journal backup.');return;}
      if(!confirm(`Import ${d.entries.length} entr${d.entries.length===1?'y':'ies'}? This replaces all current data.`))return;
      // Ensure schema
      if(!Array.isArray(d.cats))d.cats=[...DEFAULT_CATS];
      if(!d.title)d.title='My Journal';
      if(typeof d.nextId!=='number')d.nextId=d.entries.length+1;
      if(!d.dismissedNotifs)d.dismissedNotifs=[];
      _db=d;
      try{
        if(_idb)await idbPut('main',d);
        else localStorage.setItem('cj_v3',JSON.stringify(d));
        closeModal();
      }catch(storageErr){
        if(storageErr.name==='QuotaExceededError'||storageErr.code===22){
          if(confirm('Storage is full (likely due to large images).\n\nImport without uploaded images? URL-linked images are kept. You can re-upload images afterwards.')){
            const stripped={...d,entries:d.entries.map(e=>({...e,img:(e.img&&e.img.startsWith('data:'))?'':e.img,gallery:(e.gallery||[]).map(g=>({...g,src:(g.src&&g.src.startsWith('data:'))?'':g.src}))}))};
            _db=stripped;
            try{
              if(_idb)await idbPut('main',stripped);else localStorage.setItem('cj_v3',JSON.stringify(stripped));
              closeModal();
            }catch(e2){alert('Still failed: '+e2.message);}
          }
        }else{alert('Import failed: '+storageErr.message);}
      }
    }catch(outer){alert('Something went wrong: '+outer.message);}
  };
  reader.readAsText(file,'UTF-8');
}

async function requestNotifPerm(){
  if(!('Notification' in window)){alert('Your browser does not support notifications.');return;}
  await Notification.requestPermission();
  renderApp();
}
