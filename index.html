<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Character Journal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;min-height:100vh;background:#f6f5ff}

/* ── Header ── */
.header{background:white;border-bottom:1px solid #ede9fe;padding:.75rem 1rem;position:sticky;top:0;z-index:50}
.header-inner{max-width:960px;margin:0 auto}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.site-title{font-size:18px;font-weight:700;color:#4c1d95;white-space:nowrap;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.tab-nav{display:flex;gap:3px;background:#f0eeff;border-radius:9px;padding:3px;flex-shrink:0}
.tab-btn{padding:6px 16px;border-radius:6px;border:none;background:transparent;font-size:13px;font-weight:500;cursor:pointer;color:#888;transition:all .15s;font-family:inherit;white-space:nowrap}
.tab-btn.active{background:white;color:#4c1d95;box-shadow:0 1px 4px rgba(124,58,237,.15)}
.header-actions{display:flex;gap:8px;flex-shrink:0}
#search{width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;background:white;color:#1a1a1a}
#search:focus{outline:none;border-color:#7c3aed}
.filters{display:flex;gap:6px;flex-wrap:wrap;padding-top:8px}
.pill{padding:5px 13px;border-radius:20px;border:1px solid #e0e0e0;background:white;font-size:12px;color:#666;cursor:pointer;white-space:nowrap;transition:all .15s}
.pill:hover{border-color:#7c3aed;color:#7c3aed}
.pill.active{background:#7c3aed;color:white;border-color:#7c3aed}

/* ── Grid ── */
.main{max-width:960px;margin:0 auto;padding:1rem}
.count-label{font-size:12px;color:#aaa;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(162px,1fr));gap:12px}
.card{background:white;border-radius:14px;padding:1rem;cursor:pointer;border:2px solid #ede9fe;transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:0 6px 20px rgba(124,58,237,.13);transform:translateY(-2px)}
.card-img{width:72px;height:72px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;overflow:hidden}
.sh-circle{border-radius:50%}.sh-rounded{border-radius:14px}.sh-square{border-radius:4px}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-name{font-size:14px;font-weight:600;text-align:center;margin-bottom:3px;line-height:1.3}
.card-kanji{font-size:13px;color:#888;text-align:center;margin-bottom:7px}
.card-cat-wrap,.card-aff-wrap{text-align:center;margin-bottom:5px}
.badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600;display:inline-block}
.color-dot{width:9px;height:9px;border-radius:50%;display:inline-block;vertical-align:middle;border:1px solid rgba(0,0,0,.1)}
.card-color-row{text-align:center;margin-bottom:5px;font-size:10px;color:#888}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;background:#f5f3ff;color:#7c3aed;border:1px solid #ede9fe}

/* ── Detail page ── */
.detail-page{min-height:100vh;background:white}
.detail-header{background:white;border-bottom:1px solid #ede9fe;padding:.8rem 1rem;position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px}
.back-btn{padding:7px 14px;border-radius:8px;border:1px solid #e0e0e0;background:white;color:#7c3aed;cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap;flex-shrink:0}
.back-btn:hover{background:#f5f3ff}
.detail-header-name{font-size:15px;font-weight:600;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.detail-edit-btn{padding:7px 14px;border-radius:8px;border:1px solid #7c3aed;background:white;color:#7c3aed;cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap;flex-shrink:0}
.detail-edit-btn:hover{background:#f5f3ff}
.detail-body{max-width:720px;margin:0 auto;padding:1.5rem 1rem 3rem}
.detail-hero{border-radius:16px;padding:1.5rem;display:flex;gap:1.25rem;align-items:flex-start}
.detail-avatar{width:100px;height:100px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;overflow:hidden}
.detail-avatar img{width:100%;height:100%;object-fit:cover}
.detail-info{flex:1;min-width:0}
.detail-name{font-size:23px;font-weight:700;line-height:1.2;margin-bottom:4px}
.detail-kanji{font-size:15px;color:#888;margin-bottom:8px}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.detail-meta{font-size:13px;color:#666;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.detail-section{padding:1rem 0;border-top:1px solid #f0f0f0;margin-top:.5rem}
.section-label{font-size:11px;font-weight:600;color:#aaa;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.6rem}
.detail-note{background:#faf8ff;border:1px solid #ede9fe;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.8;white-space:pre-wrap}
.tags-row{display:flex;gap:5px;flex-wrap:wrap}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.gallery-item{cursor:pointer;border-radius:10px;overflow:hidden;background:transparent;border:1px solid #ede9fe}
.gallery-item:hover .g-thumb{transform:scale(1.03)}
.g-thumb{width:100%;aspect-ratio:1;object-fit:contain;display:block;transition:transform .18s;background:transparent}
.g-caption{font-size:11px;color:#666;padding:5px 8px;line-height:1.4;background:white}
.link-list{display:flex;flex-direction:column;gap:8px}
.link-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#faf8ff;border:1px solid #ede9fe;border-radius:12px;text-decoration:none;color:#1a1a1a;font-size:15px;transition:background .15s}
.link-item:hover{background:#ede9fe}
.link-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.link-label{font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-arr{color:#bbb;font-size:13px}
.yt-list{display:flex;flex-direction:column;gap:16px}
.yt-label{font-size:14px;font-weight:500;color:#555;margin-bottom:8px}
.yt-embed{border-radius:12px;overflow:hidden;background:#000;aspect-ratio:16/9}
.yt-embed iframe{width:100%;height:100%;border:none;display:block}

/* ── Calendar ── */
.cal-wrap{max-width:960px;margin:0 auto;padding:1rem}
.cal-controls{background:white;border-radius:14px;padding:1rem;margin-bottom:1rem;border:1px solid #ede9fe}
.cal-search-row{display:flex;gap:8px;align-items:center;margin-bottom:.75rem}
.cal-search{flex:1;padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;background:white;color:#1a1a1a}
.cal-search:focus{outline:none;border-color:#7c3aed}
.cal-tag-label{font-size:11px;font-weight:600;color:#aaa;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.5rem}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-month-title{font-size:20px;font-weight:700;color:#4c1d95}
.cal-nav-btns{display:flex;gap:6px;align-items:center}
.cal-nav-btn{padding:6px 14px;border-radius:8px;border:1px solid #e0e0e0;background:white;cursor:pointer;font-size:15px;color:#666;transition:all .15s;font-family:inherit}
.cal-nav-btn:hover{background:#f5f3ff;border-color:#7c3aed}
.cal-today-btn{padding:6px 14px;border-radius:8px;border:1px solid #7c3aed;background:white;cursor:pointer;font-size:12px;font-weight:600;color:#7c3aed;transition:all .15s;font-family:inherit}
.cal-today-btn:hover{background:#f5f3ff}
.cal-grid-wrap{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:#aaa;padding:5px 0;letter-spacing:.04em}
.cal-cell{min-height:88px;background:white;border:1px solid #f0eeff;border-radius:9px;padding:5px;overflow:hidden}
.cal-cell.other-month{background:#fafafa;border-color:#f5f5f5}
.cal-cell.today-cell{border:2px solid #7c3aed}
.cal-day-num{font-size:12px;color:#ccc;font-weight:500;margin-bottom:3px}
.cal-cell.today-cell .cal-day-num{color:#7c3aed;font-weight:700}
.cal-chip{font-size:10px;padding:2px 6px;border-radius:20px;margin-bottom:2px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:600;line-height:1.5;transition:opacity .12s}
.cal-chip:hover{opacity:.75}
.cal-no-bdays{text-align:center;padding:2.5rem 1rem;color:#bbb}

/* ── Notification banner ── */
.notif-banner{background:#4c1d95;color:white;padding:.85rem 1rem;display:flex;align-items:flex-start;gap:10px;position:relative}
.notif-banner-inner{max-width:960px;margin:0 auto;width:100%;display:flex;align-items:flex-start;gap:10px}
.notif-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.notif-text{flex:1;font-size:14px;line-height:1.5}
.notif-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.notif-close:hover{color:white}

/* ── Lightbox ── */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;touch-action:none}
.lb-img-wrap{flex:1;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:grab;position:relative}
.lb-img-wrap:active{cursor:grabbing}
.lb-img-wrap img{max-width:92vw;max-height:78vh;object-fit:contain;user-select:none;border-radius:6px;pointer-events:none;transition:transform .08s linear}
.lb-close{position:fixed;top:1rem;right:1rem;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:white;font-size:20px;cursor:pointer;z-index:501;display:flex;align-items:center;justify-content:center}
.lb-close:hover{background:rgba(255,255,255,.3)}
.lb-arrow{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.18);border:none;color:white;font-size:36px;width:50px;height:50px;border-radius:50%;cursor:pointer;z-index:501;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lb-arrow:hover{background:rgba(255,255,255,.3)}
.lb-prev{left:1rem}.lb-next{right:1rem}
.lb-bottom{padding:.75rem 1rem;text-align:center;width:100%}
.lb-caption{color:rgba(255,255,255,.85);font-size:14px;margin-bottom:4px;line-height:1.5}
.lb-counter{color:rgba(255,255,255,.4);font-size:12px}
.lb-zoom-hint{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-size:11px;pointer-events:none}

/* ── Crop ── */
.crop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;display:flex;align-items:center;justify-content:center;padding:1rem}
.crop-box{background:white;border-radius:16px;padding:1.25rem;max-width:600px;width:100%}
.crop-box canvas{display:block;max-width:100%;border-radius:8px;cursor:crosshair;touch-action:none}
.crop-hint{font-size:11px;color:#aaa;margin:8px 0 12px;line-height:1.5}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto}
.modal{background:white;border-radius:18px;width:100%;max-width:600px;padding:1.5rem;position:relative;margin:auto}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:22px;cursor:pointer;color:#bbb;line-height:1;padding:0}
.modal-close:hover{color:#555}
.modal-title{font-size:17px;font-weight:700;margin-bottom:1.1rem;color:#4c1d95}

/* ── Form ── */
.field{margin-bottom:.8rem}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px;font-weight:500}
.field input,.field textarea,.field select{width:100%;padding:8px 11px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;background:white;color:#1a1a1a;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:#7c3aed}
.field textarea{min-height:90px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.img-row{display:flex;gap:10px;align-items:flex-start}
.img-prev-box{width:64px;height:64px;border:1px solid #ede9fe;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;background:#f5f3ff;transition:border-radius .2s}
.img-prev-box img{width:100%;height:100%;object-fit:cover;display:none}
.img-ph{font-size:22px;color:#c4b5fd}
.img-inputs{flex:1;display:flex;flex-direction:column;gap:6px}
.img-url-row{display:flex;gap:6px}
.img-url-row input{flex:1}
.crop-url-btn{padding:7px 10px;border-radius:8px;border:1px solid #e0e0e0;background:white;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.crop-url-btn:hover{background:#f5f3ff;border-color:#7c3aed}
.shape-btns{display:flex;gap:5px}
.shape-opt{padding:3px 10px;border:1px solid #e0e0e0;border-radius:20px;font-size:11px;cursor:pointer;background:white;color:#666;transition:all .15s}
.shape-opt.active{background:#7c3aed;color:white;border-color:#7c3aed}
.color-row{display:flex;align-items:center;gap:8px}
.color-row input[type=color]{width:38px;height:36px;border:1px solid #e0e0e0;border-radius:8px;padding:2px;cursor:pointer;background:white;flex-shrink:0}
.color-row input[type=text]{flex:1}
.btn-clr{background:none;border:1px solid #e0e0e0;border-radius:7px;padding:5px 9px;font-size:12px;cursor:pointer;color:#999;flex-shrink:0}
.btn-clr:hover{background:#f5f5f5}

/* Notification checkboxes in form */
.notif-options{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.notif-check-label{display:flex;align-items:center;gap:5px;font-size:12px;color:#444;cursor:pointer;padding:4px 10px;border:1px solid #e0e0e0;border-radius:20px;background:white;transition:all .15s;user-select:none}
.notif-check-label:hover{border-color:#7c3aed;color:#7c3aed}
.notif-check-label input{accent-color:#7c3aed}
.notif-check-label.checked{background:#f5f3ff;border-color:#7c3aed;color:#7c3aed}

.notif-perm-note{font-size:11px;color:#aaa;margin-top:5px;line-height:1.5}
.notif-perm-btn{padding:4px 12px;border-radius:7px;border:1px solid #7c3aed;background:white;color:#7c3aed;font-size:12px;cursor:pointer;font-family:inherit;margin-top:5px}
.notif-perm-btn:hover{background:#f5f3ff}

.gal-list{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
.gal-form-item{display:flex;gap:10px;align-items:flex-start;padding:10px;background:#faf8ff;border:1px solid #ede9fe;border-radius:10px}
.gal-form-thumb-wrap{position:relative;flex-shrink:0}
.gal-form-thumb{width:72px;height:72px;object-fit:contain;border-radius:8px;border:1px solid #ede9fe;background:transparent;display:block}
.gal-rm{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#e53e3e;color:white;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0}
.gal-form-right{flex:1;min-width:0}
.gal-caption-inp{padding:6px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;background:white;color:#1a1a1a;width:100%}
.gal-caption-inp:focus{outline:none;border-color:#7c3aed}
.gal-add-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.gal-add-row input[type=text]{flex:1;min-width:100px;padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;background:white;color:#1a1a1a}
.gal-add-row input[type=text]:focus{outline:none;border-color:#7c3aed}
.link-form-item{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.link-form-item input{padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;background:white;color:#1a1a1a}
.link-form-item input:focus{outline:none;border-color:#7c3aed}
.lbl-inp{width:110px;flex-shrink:0}.url-inp{flex:1}
.lk-rm{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:0 2px;line-height:1;flex-shrink:0}
.lk-rm:hover{color:#e53e3e}

/* ── Buttons ── */
.btn{padding:9px 16px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid #e0e0e0;background:white;color:#1a1a1a;transition:all .15s;font-family:inherit}
.btn:hover{background:#f9f9f9}
.btn-primary{background:#7c3aed;color:white;border-color:#7c3aed}
.btn-primary:hover{background:#6d28d9}
.btn-danger{color:#dc2626;border-color:#fecaca}
.btn-danger:hover{background:#fef2f2}
.btn-row{display:flex;gap:8px;margin-top:.5rem}
.btn-row .btn{flex:1}
.add-btn{padding:8px 16px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:#7c3aed;color:white;font-family:inherit}
.add-btn:hover{background:#6d28d9}
.menu-btn{padding:7px 10px;border-radius:8px;border:1px solid #e0e0e0;background:white;cursor:pointer;font-size:16px;line-height:1}
.menu-btn:hover{background:#f5f3ff}
.sm-btn{padding:6px 11px;font-size:12px;border-radius:7px;border:1px solid #e0e0e0;background:white;cursor:pointer;white-space:nowrap;font-family:inherit}
.sm-btn:hover{background:#f5f3ff;border-color:#7c3aed}
.fab{display:none;position:fixed;bottom:1.5rem;right:1.5rem;width:58px;height:58px;border-radius:50%;background:#7c3aed;color:white;font-size:28px;border:none;cursor:pointer;z-index:40;box-shadow:0 4px 16px rgba(124,58,237,.5);align-items:center;justify-content:center;line-height:1}
.fab:active{transform:scale(.95)}
.empty{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:#bbb}
.empty-icon{font-size:48px;margin-bottom:.75rem}
hr.div{border:none;border-top:1px solid #f0f0f0;margin:1rem 0}
.settings-row{display:flex;gap:8px;flex-wrap:wrap}

@media(max-width:640px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .fab{display:flex}
  .add-btn{display:none}
  .modal{padding:1.25rem;border-radius:14px}
  .site-title{font-size:15px}
  .tab-btn{padding:5px 10px;font-size:12px}
  .detail-hero{flex-direction:column;align-items:center;text-align:center}
  .detail-badges{justify-content:center}
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .cal-cell{min-height:60px;padding:4px 3px}
  .cal-chip{font-size:9px;padding:1px 5px}
  .cal-day-num{font-size:11px}
}
</style>
</head>
<body>
<div id="notif-banner-root"></div>
<div id="page-root"></div>
<div id="modal-root"></div>
<div id="crop-root"></div>
<div id="lb-root"></div>

<script>
/* ════════════════════════════════
   CONSTANTS
════════════════════════════════ */
const PALETTES=[['#ede9fe','#4c1d95'],['#d1fae5','#064e3b'],['#fce7f3','#831843'],['#fef3c7','#78350f'],['#dbeafe','#1e3a8a'],['#ffe4e6','#881337'],['#f0fdf4','#14532d'],['#fff7ed','#7c2d12'],['#f0f9ff','#0c4a6e'],['#fdf4ff','#581c87'],['#ecfdf5','#022c22'],['#fef9c3','#713f12']];

const AFFINITY=[
  {value:'kamioshi',    label:'神推し — Kamioshi',  short:'神推し',   bg:'#fef3c7',color:'#78350f'},
  {value:'oshi',        label:'推し — Oshi',         short:'推し',     bg:'#ede9fe',color:'#4c1d95'},
  {value:'love',        label:'Love',                short:'Love',     bg:'#fce7f3',color:'#831843'},
  {value:'like',        label:'Like',                short:'Like',     bg:'#dbeafe',color:'#1e3a8a'},
  {value:'pos_neutral', label:'Positive Neutral',    short:'+Neutral', bg:'#d1fae5',color:'#065f46'},
  {value:'true_neutral',label:'True Neutral',        short:'Neutral',  bg:'#f3f4f6',color:'#374151'},
  {value:'neg_neutral', label:'Negative Neutral',    short:'−Neutral', bg:'#fef9c3',color:'#713f12'},
  {value:'dislike',     label:'Dislike',             short:'Dislike',  bg:'#ffedd5',color:'#9a3412'},

function loadDB(){try{return JSON.parse(localStorage.getItem('cj_v3')||'null')||{};}catch(e){return{};}}
function saveDB(d){localStorage.setItem('cj_v3',JSON.stringify(d));}
function getDB(){
  const d=loadDB();
  if(!Array.isArray(d.entries))d.entries=[];
  if(!Array.isArray(d.cats))d.cats=[...DEFAULT_CATS];
  if(!d.title)d.title='My Journal';
  if(typeof d.nextId!=='number')d.nextId=1;
  // dismissed notifications: set of strings "entryId_notifType_year"
  if(!d.dismissedNotifs)d.dismissedNotifs=[];
  return d;
}

/* ════════════════════════════════
   HELPERS
════════════════════════════════ */
function initials(n){return(n||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();}
function pal(id){return PALETTES[(id||0)%PALETTES.length];}
function catPal(cat,cats){const i=cats.indexOf(cat);return PALETTES[(i>=0?i:0)%PALETTES.length];}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function affData(v){return AFFINITY.find(a=>a.value===v)||null;}
function ytId(url){const m=(url||'').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?/\s]+)/);return m?m[1]:null;}
function lkIcon(url){if(ytId(url))return'▶';if(/twitter\.com|x\.com/.test(url))return'𝕏';if(/instagram\.com/.test(url))return'📷';if(/tiktok\.com/.test(url))return'♪';if(/twitch\.tv/.test(url))return'🎮';if(/spotify\.com/.test(url))return'♫';return'🔗';}
function normGal(g){if(!Array.isArray(g))return[];return g.map(x=>typeof x==='string'?{src:x,caption:''}:x);}
function checkAlpha(c){try{const d=c.getContext('2d').getImageData(0,0,Math.min(c.width,80),Math.min(c.height,80)).data;for(let i=3;i<d.length;i+=4)if(d[i]<250)return true;}catch(e){}return false;}
function toDataUrl(c){return checkAlpha(c)?c.toDataURL('image/png'):c.toDataURL('image/jpeg',.94);}
function resizeEncode(img,maxPx){let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);return toDataUrl(c);}
function contrastColor(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)/255>0.55?'#1a1a1a':'#ffffff';}

function parseBirthday(str){
  if(!str)return null;
  const MON=['january','february','march','april','may','june','july','august','september','october','november','december'];
  const s=str.trim().toLowerCase().replace(/[,]/g,'');
  let m=s.match(/^(\d{1,2})[\/\-](\d{1,2})/);
  if(m){const mo=parseInt(m[1]),d=parseInt(m[2]);if(mo>=1&&mo<=12&&d>=1&&d<=31)return{month:mo,day:d};}
  for(let i=0;i<MON.length;i++){
    if(s.includes(MON[i].slice(0,3))){const dm=s.match(/(\d{1,2})/);if(dm){const d=parseInt(dm[1]);if(d>=1&&d<=31)return{month:i+1,day:d};}}
  }
  return null;
}

function calcAge(birthYear,birthday){
  if(!birthYear||!birthday)return null;
  const bd=parseBirthday(birthday);if(!bd)return null;
  const now=new Date();
  let age=now.getFullYear()-parseInt(birthYear);
  // If birthday hasn't occurred yet this year, subtract 1
  const thisYearBday=new Date(now.getFullYear(),bd.month-1,bd.day);
  if(now<thisYearBday)age--;
  return age>=0?age:null;
}

/* ════════════════════════════════
   BIRTHDAY NOTIFICATIONS
════════════════════════════════ */
function daysUntilBirthday(bd){
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  let bday=new Date(now.getFullYear(),bd.month-1,bd.day);
  if(bday<today)bday=new Date(now.getFullYear()+1,bd.month-1,bd.day);
  return Math.round((bday-today)/(1000*60*60*24));
}

function checkBirthdayNotifications(){
  const db=getDB();
  const today=new Date();
  const year=today.getFullYear();
  const alerts=[];

  db.entries.forEach(e=>{
    if(!e.birthday||!Array.isArray(e.notifOptions)||e.notifOptions.length===0)return;
    const bd=parseBirthday(e.birthday);if(!bd)return;
    const days=daysUntilBirthday(bd);

    e.notifOptions.forEach(opt=>{
      let threshold=0;
      if(opt==='day_of')threshold=0;
      else if(opt==='day_before')threshold=1;
      else if(opt==='week_before')threshold=7;
      else if(opt==='month_before')threshold=30;

      if(days===threshold){
        const key=`${e.id}_${opt}_${year}`;
        if(!db.dismissedNotifs.includes(key)){
          let msg='';
          if(days===0)msg=`🎂 Today is ${e.name}'s birthday!`;
          else if(days===1)msg=`🎂 ${e.name}'s birthday is tomorrow!`;
          else msg=`🎂 ${e.name}'s birthday is in ${days} days (${MONTH_NAMES[bd.month-1]} ${bd.day})`;
          alerts.push({key,msg,id:e.id});
        }
      }
    });
  });

  if(alerts.length>0){
    renderBirthdayBanner(alerts);
    // Also try browser push notification
    if('Notification' in window&&Notification.permission==='granted'){
      alerts.forEach(a=>{
        try{new Notification('My Character Journal',{body:a.msg,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="26" font-size="28">🎂</text></svg>'});}catch(e){}
      });
    }
  }
}

function renderBirthdayBanner(alerts){
  const root=document.getElementById('notif-banner-root');
  root.innerHTML=`<div class="notif-banner"><div class="notif-banner-inner">
    <span class="notif-icon">🎂</span>
    <div class="notif-text">${alerts.map(a=>`<div style="cursor:pointer" onclick="go('detail',${a.id})">${esc(a.msg)}</div>`).join('')}</div>
    <button class="notif-close" onclick="dismissBanner(${JSON.stringify(alerts.map(a=>a.key))})">✕</button>
  </div></div>`;
}

function dismissBanner(keys){
  const db=getDB();
  keys.forEach(k=>{if(!db.dismissedNotifs.includes(k))db.dismissedNotifs.push(k);});
  // Only keep current year's dismissals to avoid bloat
  const y=new Date().getFullYear()+'';
  db.dismissedNotifs=db.dismissedNotifs.filter(k=>k.includes('_'+y));
  saveDB(db);
  document.getElementById('notif-banner-root').innerHTML='';
}

async function requestNotifPermission(){
  if(!('Notification' in window)){alert('Your browser does not support notifications.');return;}
  const result=await Notification.requestPermission();
  if(result==='granted'){
    renderApp();// re-render to update the note
    try{new Notification('My Character Journal',{body:'Notifications enabled! You\'ll be alerted for birthdays when you open the app.'});}catch(e){}
  }
}

function gridPage(){

    const mf=S.filter==='All'||e.cat===S.filter;

  });
  const cards=!list.length
    ?`<div class="empty"><div class="empty-icon">${db.entries.length?'🔍':'✨'}</div><p>${db.entries.length?'No results found.':'No entries yet — hit + Add to get started!'}</p></div>`

        <div class="card-cat-wrap"><span class="badge" style="background:${cbg};color:${cfg}">${esc(e.cat)}</span></div>

      </div>`;
    }).join('');

  <div class="main"><div class="count-label">${list.length} entr${list.length===1?'y':'ies'}</div><div class="grid">${cards}</div></div>

}

/* ════════════════════════════════

════════════════════════════════ */
function calendarPage(){
  const db=getDB();
  const q=(S.calSearch||'').toLowerCase();
  const year=S.calYear,month=S.calMonth;
  const usedCats=[...new Set(db.entries.map(e=>e.cat))];
  if(!['All',...usedCats].includes(S.calCatFilter))S.calCatFilter='All';
  const catPills=['All',...usedCats].map(f=>`<div class="pill${S.calCatFilter===f?' active':''}" onclick="S.calCatFilter=${JSON.stringify(f)};renderApp()">${esc(f)}</div>`).join('');

  const withBdays=db.entries.filter(e=>{
    if(!parseBirthday(e.birthday))return false;
    const mf=S.calCatFilter==='All'||e.cat===S.calCatFilter;
    if(!mf)return false;
    if(!q)return true;
    return[e.name,e.kanji,e.source,...(e.tags||[])].join(' ').toLowerCase().includes(q);
  });
  const dayMap={};
  withBdays.forEach(e=>{
    const bd=parseBirthday(e.birthday);
    if(bd&&bd.month===month){if(!dayMap[bd.day])dayMap[bd.day]=[];dayMap[bd.day].push(e);}
  });

  const firstDow=new Date(year,month-1,1).getDay();
  const daysInM=new Date(year,month,0).getDate();
  const prevDays=new Date(year,month-1,0).getDate();
  const todayD=_now.getDate(),isThisMonth=_now.getMonth()+1===month&&_now.getFullYear()===year;
  const dowRow=DOW_SHORT.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  let cells='';
  for(let i=0;i<firstDow;i++)cells+=`<div class="cal-cell other-month"><div class="cal-day-num">${prevDays-firstDow+1+i}</div></div>`;
  for(let d=1;d<=daysInM;d++){
    const isToday=isThisMonth&&d===todayD;
    const entries=dayMap[d]||[];
    const chips=entries.map(e=>{
      const chipBg=e.hexColor||'#7c3aed';
      const chipFg=e.hexColor?contrastColor(e.hexColor):'#ffffff';
      const age=calcAge(e.birthYear,e.birthday);
      const ageStr=age!==null?` (${age+1})`:'';
      return`<span class="cal-chip" style="background:${chipBg};color:${chipFg}" onclick="go('detail',${e.id},true)" title="${esc(e.name)}${ageStr}">${esc(e.name)}${ageStr}</span>`;
    }).join('');
    cells+=`<div class="cal-cell${isToday?' today-cell':''}"><div class="cal-day-num">${d}</div>${chips}</div>`;
  }
  const total=firstDow+daysInM;const rem=total%7===0?0:7-total%7;
  for(let i=1;i<=rem;i++)cells+=`<div class="cal-cell other-month"><div class="cal-day-num">${i}</div></div>`;

  const noBdays=withBdays.length===0?`<div class="cal-no-bdays"><div style="font-size:36px;margin-bottom:.5rem">🎂</div><p>No entries with birthdays yet.<br>Add a birthday to see it here!</p></div>`:
    Object.keys(dayMap).length===0?`<div style="text-align:center;padding:1.5rem;font-size:13px;color:#bbb;grid-column:1/-1">No birthdays this month for the current filter.</div>`:'';

  return`${sharedHeader('calendar')}
  <div class="cal-wrap">
    <div class="cal-controls">
      <div class="cal-search-row"><input class="cal-search" type="text" placeholder="Filter by name, tag…" value="${esc(S.calSearch)}" oninput="S.calSearch=this.value;renderApp()"></div>
      <div class="cal-tag-label">Filter by category</div>
      <div class="filters" style="padding-top:0">${catPills}</div>
    </div>
    <div class="cal-nav">
      <div class="cal-month-title">${MONTH_NAMES[month-1]} ${year}</div>
      <div class="cal-nav-btns">
        <button class="cal-today-btn" onclick="S.calYear=${_now.getFullYear()};S.calMonth=${_now.getMonth()+1};renderApp()">Today</button>
        <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
        <button class="cal-nav-btn" onclick="calNav(1)">›</button>
      </div>
    </div>
    <div class="cal-grid-wrap">${dowRow}${cells}${noBdays}</div>
  </div>
  <button class="fab" onclick="openAdd()">+</button>`;
}
function calNav(dir){S.calMonth+=dir;if(S.calMonth>12){S.calMonth=1;S.calYear++;}if(S.calMonth<1){S.calMonth=12;S.calYear--;}renderApp();}

    <div class="lb-zoom-hint">Scroll to zoom · drag to pan</div>
  </div>`;
  const wrap=document.getElementById('lb-wrap');
  wrap.addEventListener('wheel',ev=>{ev.preventDefault();lbState.zoom=Math.max(1,Math.min(7,lbState.zoom+(ev.deltaY>0?-0.35:0.35)));if(lbState.zoom===1){lbState.panX=0;lbState.panY=0;}updateLBImg();},{passive:false});
  let pd=null;
  wrap.addEventListener('mousedown',ev=>{if(lbState.zoom<=1)return;pd={sx:ev.clientX-lbState.panX,sy:ev.clientY-lbState.panY};ev.preventDefault();});
  const onMM=ev=>{if(!pd)return;lbState.panX=ev.clientX-pd.sx;lbState.panY=ev.clientY-pd.sy;updateLBImg();};
  const onMU=()=>pd=null;
  window.addEventListener('mousemove',onMM);window.addEventListener('mouseup',onMU);
  let tx=0;
  document.getElementById('lb-main').addEventListener('touchstart',ev=>{tx=ev.touches[0].clientX;},{passive:true});
  document.getElementById('lb-main').addEventListener('touchend',ev=>{const dx=ev.changedTouches[0].clientX-tx;if(Math.abs(dx)>55&&lbState.zoom<=1)lbNav(dx>0?-1:1);},{passive:true});
  document.getElementById('lb-main').addEventListener('click',ev=>{if(ev.target===document.getElementById('lb-main'))closeLB();});
  lbState._kh=ev=>{if(ev.key==='ArrowLeft')lbNav(-1);else if(ev.key==='ArrowRight')lbNav(1);else if(ev.key==='Escape')closeLB();};
  document.addEventListener('keydown',lbState._kh);
  lbState._cl=()=>{window.removeEventListener('mousemove',onMM);window.removeEventListener('mouseup',onMU);if(lbState._kh)document.removeEventListener('keydown',lbState._kh);};
}
function updateLBImg(){const img=document.getElementById('lb-img');if(img)img.style.transform=`scale(${lbState.zoom}) translate(${lbState.panX/lbState.zoom}px,${lbState.panY/lbState.zoom}px)`;}
function lbNav(dir){if(!lbState)return;if(lbState._cl)lbState._cl();const n=lbState.gallery.length;lbState.idx=(lbState.idx+dir+n)%n;lbState.zoom=1;lbState.panX=0;lbState.panY=0;renderLB();}
function closeLB(){if(lbState&&lbState._cl)lbState._cl();document.getElementById('lb-root').innerHTML='';lbState=null;}

/* ════════════════════════════════
   CROP TOOL
════════════════════════════════ */
function initCrop(imgSrc,callback){
  document.getElementById('crop-root').innerHTML=`<div class="crop-overlay"><div class="crop-box">
    <div style="font-size:15px;font-weight:600;margin-bottom:10px">Crop image</div>
    <canvas id="crop-canvas"></canvas>
    <div class="crop-hint">Drag to draw a selection · drag inside to move · drag corners to resize</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="cropApply()">Crop & use</button>
      <button class="btn" style="flex:1" onclick="cropSkip()">Use full image</button>
      <button class="btn" onclick="cropCancel()">Cancel</button>
    </div>
  </div></div>`;
  const canvas=document.getElementById('crop-canvas');
  const img=new Image();
  img.onload=()=>{
    const maxW=Math.min(540,window.innerWidth-64),maxH=Math.min(480,window.innerHeight-260);
    const scale=Math.min(maxW/img.width,maxH/img.height,1);
    const cw=Math.round(img.width*scale),ch=Math.round(img.height*scale);
    canvas.width=cw;canvas.height=ch;
    const HS=12;let rect={x:0,y:0,w:cw,h:ch},drag=null;
    cropData={img,scale,callback,get rect(){return rect;}};
    function draw(){const ctx=canvas.getContext('2d');ctx.clearRect(0,0,cw,ch);ctx.drawImage(img,0,0,cw,ch);ctx.fillStyle='rgba(0,0,0,.53)';ctx.fillRect(0,0,cw,ch);const{x,y,w,h}=rect;if(w>0&&h>0){ctx.clearRect(x,y,w,h);ctx.drawImage(img,x/scale,y/scale,w/scale,h/scale,x,y,w,h);ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.strokeRect(x,y,w,h);ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=.5;[1/3,2/3].forEach(t=>{ctx.beginPath();ctx.moveTo(x+w*t,y);ctx.lineTo(x+w*t,y+h);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y+h*t);ctx.lineTo(x+w,y+h*t);ctx.stroke();});ctx.fillStyle='white';[[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([hx,hy])=>ctx.fillRect(hx-HS/2,hy-HS/2,HS,HS));}}
    function pos(e){const r=canvas.getBoundingClientRect(),cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;return[(cx-r.left)*cw/r.width,(cy-r.top)*ch/r.height];}
    function hit(mx,my){const{x,y,w,h}=rect;for(const[hx,hy,n]of[[x,y,'nw'],[x+w,y,'ne'],[x,y+h,'sw'],[x+w,y+h,'se']])if(Math.abs(mx-hx)<=HS+2&&Math.abs(my-hy)<=HS+2)return n;if(mx>x&&mx<x+w&&my>y&&my<y+h)return'move';return'new';}
    const onDown=e=>{e.preventDefault();const[mx,my]=pos(e);drag={type:hit(mx,my),sx:mx,sy:my,sr:{...rect}};};
    const onMove=e=>{if(!drag)return;e.preventDefault();const[mx,my]=pos(e),dx=mx-drag.sx,dy=my-drag.sy;let{x,y,w,h}=drag.sr;if(drag.type==='new'){x=Math.min(drag.sx,mx);y=Math.min(drag.sy,my);w=Math.abs(mx-drag.sx);h=Math.abs(my-drag.sy);}else if(drag.type==='move'){x=Math.max(0,Math.min(cw-w,drag.sr.x+dx));y=Math.max(0,Math.min(ch-h,drag.sr.y+dy));}else{if(drag.type.includes('e'))w=Math.max(20,drag.sr.w+dx);if(drag.type.includes('s'))h=Math.max(20,drag.sr.h+dy);if(drag.type.includes('w')){const nx=Math.min(drag.sr.x+drag.sr.w-20,drag.sr.x+dx);w=drag.sr.x+drag.sr.w-nx;x=nx;}if(drag.type.includes('n')){const ny=Math.min(drag.sr.y+drag.sr.h-20,drag.sr.y+dy);h=drag.sr.y+drag.sr.h-ny;y=ny;}}x=Math.max(0,x);y=Math.max(0,y);w=Math.min(cw-x,Math.max(20,w));h=Math.min(ch-y,Math.max(20,h));rect={x,y,w,h};draw();};
    const onUp=()=>drag=null;
    canvas.addEventListener('mousedown',onDown);canvas.addEventListener('mousemove',onMove);canvas.addEventListener('mouseup',onUp);
    canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp);
    draw();
  };
  img.crossOrigin='anonymous';img.src=imgSrc;
}
function cropApply(){if(!cropData)return;const{img,scale,callback,rect}=cropData;const nx=Math.round(rect.x/scale),ny=Math.round(rect.y/scale),nw=Math.max(1,Math.round(rect.w/scale)),nh=Math.max(1,Math.round(rect.h/scale));const out=document.createElement('canvas');out.width=nw;out.height=nh;out.getContext('2d').drawImage(img,nx,ny,nw,nh,0,0,nw,nh);document.getElementById('crop-root').innerHTML='';cropData=null;callback(toDataUrl(out));}
function cropSkip(){if(!cropData)return;const{img,callback}=cropData;document.getElementById('crop-root').innerHTML='';cropData=null;callback(resizeEncode(img,1400));}
function cropCancel(){document.getElementById('crop-root').innerHTML='';cropData=null;}

  return`

    </div>
    <div class="form-row">
      <div class="field"><label>Source (show, group…)</label><input id="f-source" value="${e?esc(e.source||''):''}" placeholder="e.g. Hololive"></div>

      <div class="field"><label>Affinity level</label><select id="f-affinity">${affOpts}</select></div>

        <div class="color-row">
          <input type="color" id="f-cpicker" value="${hex||'#7c3aed'}" oninput="syncColor('picker')">

function updateNotifLabel(value,checked){

function getFormNotifs(){

/* Gallery / Links form */
function renderGalList(){const el=document.getElementById('gal-list');if(!el)return;el.innerHTML=F.gallery.map((item,i)=>`<div class="gal-form-item"><div class="gal-form-thumb-wrap"><img class="gal-form-thumb" src="${esc(item.src)}" onerror="this.style.opacity='.3'"><button class="gal-rm" onclick="rmGal(${i})">✕</button></div><div class="gal-form-right"><input class="gal-caption-inp" placeholder="Description for this image…" value="${esc(item.caption||'')}" oninput="F.gallery[${i}].caption=this.value"></div></div>`).join('');}
function rmGal(i){F.gallery.splice(i,1);renderGalList();}
function addGalUrl(){const inp=document.getElementById('gal-url-inp');const url=(inp.value||'').trim();if(!url)return;F.gallery.push({src:url,caption:''});inp.value='';renderGalList();}
function addGalFile(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{initCrop(ev.target.result,src=>{F.gallery.push({src,caption:''});renderGalList();});};reader.readAsDataURL(file);input.value='';}
function renderLinkList(){const el=document.getElementById('link-list-form');if(!el)return;el.innerHTML=F.links.map((lk,i)=>`<div class="link-form-item"><input class="lbl-inp" placeholder="Label (e.g. Twitter)" value="${esc(lk.label)}" oninput="F.links[${i}].label=this.value"><input class="url-inp" placeholder="URL" value="${esc(lk.url)}" oninput="F.links[${i}].url=this.value"><button class="lk-rm" onclick="rmLink(${i})">✕</button></div>`).join('');}
function rmLink(i){F.links.splice(i,1);renderLinkList();}
function addLink(){F.links.push({label:'',url:''});renderLinkList();}

/* Image helpers */
function setShape(s){F.shape=s;const box=document.getElementById('img-prev-box');if(box)box.className='img-prev-box sh-'+s;document.querySelectorAll('.shape-opt').forEach(el=>el.classList.toggle('active',el.textContent===s));}
function syncColor(src){if(src==='picker'){document.getElementById('f-ctext').value=document.getElementById('f-cpicker').value;}else{const v=(document.getElementById('f-ctext').value||'').trim();if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById('f-cpicker').value=v;}}
function clearColor(){document.getElementById('f-ctext').value='';document.getElementById('f-cpicker').value='#7c3aed';}
function getFormColor(){const v=(document.getElementById('f-ctext').value||'').trim();return/^#[0-9a-fA-F]{6}$/.test(v)?v:'';}
function setPrevImg(src){const img=document.getElementById('img-prev'),ph=document.getElementById('img-ph');if(img){img.src=src||'';img.style.display=src?'block':'none';}if(ph)ph.style.display=src?'none':'';}
function onUrlInput(){setPrevImg((document.getElementById('f-img-url').value||'').trim());}
function onFileInput(){const file=document.getElementById('f-img-file').files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{initCrop(ev.target.result,src=>{document.getElementById('f-img-url').value='';setPrevImg(src);});};reader.readAsDataURL(file);}
function cropFromUrl(){const url=(document.getElementById('f-img-url').value||'').trim();if(!url){alert('Paste an image URL first.');return;}initCrop(url,src=>{document.getElementById('f-img-url').value='';setPrevImg(src);});}
function getFormImg(){const prev=document.getElementById('img-prev');if(prev&&prev.style.display!=='none'&&prev.src&&prev.src!==window.location.href)return prev.src;return'';}
function collectForm(){
  return{
    name:(document.getElementById('f-name').value||'').trim(),
    kanji:(document.getElementById('f-kanji').value||'').trim(),
    source:(document.getElementById('f-source').value||'').trim(),
    cat:document.getElementById('f-cat').value,
    affinity:document.getElementById('f-affinity').value,
    birthday:(document.getElementById('f-birthday').value||'').trim(),
    birthYear:(document.getElementById('f-birthyear').value||'').trim(),
    notifOptions:getFormNotifs(),
    hexColor:getFormColor(),
    img:getFormImg(),
    imgShape:F.shape,
    tags:(document.getElementById('f-tags').value||'').split(',').map(t=>t.trim()).filter(Boolean),
    note:(document.getElementById('f-note').value||'').trim(),
    gallery:[...F.gallery],
    links:F.links.filter(l=>l.url.trim()),
  };
}

function saveNew(){const f=collectForm();if(!f.name){alert('Please enter a name!');return;}const db=getDB();db.entries.push({...f,id:db.nextId++});saveDB(db);closeModal();}
function saveEdit(id){const f=collectForm();if(!f.name){alert('Please enter a name!');return;}const db=getDB();const i=db.entries.findIndex(x=>x.id===id);if(i>=0)db.entries[i]={...db.entries[i],...f};saveDB(db);closeModal();}
function deleteEntry(id){if(!confirm('Delete this entry? This cannot be undone.'))return;const db=getDB();db.entries=db.entries.filter(x=>x.id!==id);saveDB(db);S.view=S.fromCal?'calendar':'grid';S.id=null;closeModal();}

   SETTINGS
════════════════════════════════ */
function openMenu(){
  const db=getDB();
  document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="overlayClick(event)"><div class="modal" onclick="event.stopPropagation()"><button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Settings & Tools</div>
    <div class="field"><label>Journal title</label><input id="m-title" value="${esc(db.title)}"></div>
    <div class="field"><label>Categories (one per line)</label><textarea id="m-cats" style="min-height:160px">${db.cats.map(esc).join('\n')}</textarea></div>
    <div class="btn-row" style="margin-bottom:0"><button class="btn btn-primary" onclick="saveSettings()">Save settings</button></div>
    <hr class="div">
    <div style="font-size:11px;font-weight:600;color:#aaa;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.5rem">Backup & Restore</div>
    <p style="font-size:12px;color:#aaa;margin-bottom:8px">Export regularly to keep your data safe. Import to restore on any device.</p>
    <div class="settings-row">
      <button class="btn" onclick="exportData()">Export backup (.json)</button>
      <button class="btn" onclick="document.getElementById('imp-inp').click()">Import backup</button>
    </div>
    <input type="file" id="imp-inp" accept=".json,application/json,text/plain,text/*" style="display:none" onchange="importData(event)">
  </div></div>`;

function saveSettings(){const db=getDB();db.title=(document.getElementById('m-title').value||'My Journal').trim();const rawCats=(document.getElementById('m-cats').value||'').split('\n').map(c=>c.trim()).filter(Boolean);db.cats=rawCats.length?rawCats:[...DEFAULT_CATS];saveDB(db);closeModal();}
function exportData(){const db=getDB();const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='character-journal-backup.json';a.click();URL.revokeObjectURL(a.href);}
function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onerror=()=>alert('Could not read the file. Try again or use a different browser.');
  reader.onload=e=>{
    try{
      // Strip BOM (iOS adds this), trim whitespace, handle wrapped text
      let text=(e.target.result||'');
      text=text.replace(/^\uFEFF/,'').replace(/^\u00EF\u00BB\u00BF/,'').trim();
      // Some mobile browsers wrap the content in quotes — unwrap if needed
      if(text.startsWith('"')&&text.endsWith('"')){try{text=JSON.parse(text);}catch(e){}}
      let d;
      try{d=JSON.parse(text);}
      catch(parseErr){
        alert('The file could not be parsed as JSON.\n\nTip: Make sure you are selecting the .json file exported from this app, not a screenshot or other file.\n\nError: '+parseErr.message);
        return;
      }
      if(!d||typeof d!=='object'||!Array.isArray(d.entries)){
        alert('This file does not look like a valid journal backup. Make sure you exported it from this app using "Export backup".');
        return;
      }
      if(!confirm(`Import ${d.entries.length} entr${d.entries.length===1?'y':'ies'}? This will replace all your current data.`))return;
      try{
        saveDB(d);
        closeModal();
      }catch(storageErr){
        // Quota exceeded — try importing without embedded images
        if(storageErr.name==='QuotaExceededError'||storageErr.code===22){
          if(confirm('Your backup is too large to fit in browser storage (likely due to uploaded images).\n\nWould you like to import just the text data (names, notes, links etc.) without the images? You can re-add images manually afterwards.')){
            const stripped={...d,entries:d.entries.map(e=>({...e,img:'',gallery:(e.gallery||[]).map(g=>({...g,src:g.src&&g.src.startsWith('data:')?'':g.src}))}))};
            try{saveDB(stripped);closeModal();}
            catch(e2){alert('Still too large. Try clearing some browser data and trying again.');}
          }
        }else{
          alert('Import failed: '+storageErr.message);
        }
      }
    }catch(outerErr){
      alert('Something went wrong: '+outerErr.message);
    }
  };
  reader.readAsText(file,'UTF-8');
}

async function requestNotifPermission(){
  if(!('Notification' in window)){alert('Your browser does not support notifications.');return;}
  await Notification.requestPermission();
  renderApp();
}
